<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hickory House Inventory</title>
    
    <!-- Favicon Logo -->
    <link rel="icon" type="image/png" href="logo.png" />
    
    <!-- Google Fonts for a sleek, professional look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        diner: {
                            bg: '#FDFBF7',      // Warm cream/off-white background
                            surface: '#FFFFFF', // Crisp white for cards
                            border: '#E7E5E4',  // Stone-200 for soft borders
                            text: '#292524',    // Espresso/Stone-800 for main text
                            muted: '#78716C',   // Stone-500 for secondary text
                            primary: '#EA580C', // Orange-600 (Rustic Terracotta)
                            hover: '#C2410C',   // Orange-700 for hover states
                            accent: '#059669',  // Emerald-600 for positive numbers
                            danger: '#DC2626',  // Red-600 for negative/delete
                        }
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body {
            background-color: #FDFBF7;
            color: #292524;
            margin: 0;
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animation-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar for sleekness */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #A8A29E; }

        /* Dark mode overrides */
        body.dark-mode {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        body.dark-mode .bg-diner-bg { background-color: #0f172a !important; }
        body.dark-mode .bg-diner-surface,
        body.dark-mode .bg-white { background-color: #111827 !important; }
        body.dark-mode [class*="bg-stone-50"],
        body.dark-mode [class*="bg-stone-100"],
        body.dark-mode [class*="bg-orange-50"],
        body.dark-mode [class*="bg-red-50"] { background-color: #1e293b !important; }
        body.dark-mode .border-diner-border,
        body.dark-mode [class*="border-stone"],
        body.dark-mode [class*="border-red"] { border-color: #334155 !important; }
        body.dark-mode .text-diner-text,
        body.dark-mode [class*="text-stone-800"] { color: #e2e8f0 !important; }
        body.dark-mode .text-diner-muted,
        body.dark-mode [class*="text-stone-400"],
        body.dark-mode [class*="text-stone-300"] { color: #94a3b8 !important; }
        body.dark-mode input,
        body.dark-mode select,
        body.dark-mode textarea {
            background-color: #0f172a !important;
            color: #e2e8f0 !important;
            border-color: #475569 !important;
        }
        body.dark-mode input::placeholder,
        body.dark-mode textarea::placeholder { color: #64748b !important; }
        body.dark-mode .shadow-sm,
        body.dark-mode .shadow-xl,
        body.dark-mode .shadow-2xl { box-shadow: 0 10px 35px rgba(0,0,0,0.35) !important; }


        /* Mobile app shell and drawer polish */
        .app-shell {
            height: 100vh;
            height: 100dvh;
        }
        .mobile-drawer {
            height: 100vh;
            height: 100dvh;
            max-height: 100dvh;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        .mobile-bottom-nav {
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        }
        @media (max-width: 767px) {
            body { overscroll-behavior: none; }
            button, input, select, textarea { font-size: 16px; }
            button, select, input[type="text"], input[type="number"], input[type="date"] { min-height: 44px; }
            .overflow-x-auto { -webkit-overflow-scrolling: touch; }
            .overflow-x-auto table { min-width: 720px; }
            .mobile-content-pad { padding-bottom: calc(6.25rem + env(safe-area-inset-bottom)); }
            .fixed.inset-0 .max-w-md,
            .fixed.inset-0 .max-w-lg,
            .fixed.inset-0 .max-w-xl {
                width: calc(100vw - 1.5rem);
                max-height: calc(100dvh - 1.5rem);
                overflow-y: auto;
            }
            .fixed.inset-0 form { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
        }

        /* Resupply mapping table: keep column dropdowns readable while allowing horizontal scroll */
        .resupply-map-scroll {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: visible;
            padding-bottom: 0.75rem;
            -webkit-overflow-scrolling: touch;
        }
        .resupply-map-scroll::-webkit-scrollbar {
            height: 14px;
        }
        .resupply-map-scroll::-webkit-scrollbar-thumb {
            border-radius: 999px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }
        .resupply-map-table {
            width: max-content;
            min-width: 100%;
            table-layout: auto;
            border-collapse: separate;
            border-spacing: 0;
        }
        .resupply-map-table th,
        .resupply-map-table td {
            min-width: 18rem;
            max-width: 26rem;
        }
        .resupply-map-select {
            display: block;
            width: 100%;
            min-width: 16.5rem;
            white-space: nowrap;
        }
        .resupply-map-cell {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 767px) {
            .resupply-map-table th,
            .resupply-map-table td {
                min-width: 19rem;
                max-width: 24rem;
            }
            .resupply-map-select {
                min-width: 17.5rem;
            }
        }


    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ICONS (Inline to avoid external dependencies)
        // ==========================================
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                folderOpen: <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" />,
                fileText: <><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></>,
                plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
                trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                edit2: <><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></>,
                save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
                x: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                calculator: <><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>,
                alertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
                loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
                upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                clipboard: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                book: <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>,
                helpCircle: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4"/><path d="M12 17h.01"/></>
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        // ==========================================
        // CONSTANTS & CONFIG
        // ==========================================
        const UNITS = {
            // Weight (Base: g)
            'lb':   { type: 'weight', toBase: 453.592, baseUnit: 'g', label: 'Pounds (lb)' },
            'oz':   { type: 'weight', toBase: 28.3495, baseUnit: 'g', label: 'Ounces (oz)' },
            'g':    { type: 'weight', toBase: 1,       baseUnit: 'g', label: 'Grams (g)' },
            'kg':   { type: 'weight', toBase: 1000,    baseUnit: 'g', label: 'Kilograms (kg)' },
            
            // Volume (Base: ml)
            'gal':  { type: 'volume', toBase: 3785.41, baseUnit: 'ml', label: 'Gallons (gal)' },
            'qt':   { type: 'volume', toBase: 946.353, baseUnit: 'ml', label: 'Quarts (qt)' },
            'pt':   { type: 'volume', toBase: 473.176, baseUnit: 'ml', label: 'Pints (pt)' },
            'cup':  { type: 'volume', toBase: 236.588, baseUnit: 'ml', label: 'Cups (cup)' },
            'fl oz':{ type: 'volume', toBase: 29.5735, baseUnit: 'ml', label: 'Fluid Ounces (fl oz)' },
            'tbsp': { type: 'volume', toBase: 14.7868, baseUnit: 'ml', label: 'Tablespoons (tbsp)' },
            'tsp':  { type: 'volume', toBase: 4.92892, baseUnit: 'ml', label: 'Teaspoons (tsp)' },
            'ml':   { type: 'volume', toBase: 1,       baseUnit: 'ml', label: 'Milliliters (ml)' },
            'l':    { type: 'volume', toBase: 1000,    baseUnit: 'ml', label: 'Liters (l)' },
            
            // Real Measurements / Count (Base: ea)
            'ea':   { type: 'count', toBase: 1,  baseUnit: 'ea', label: 'Each (ea)' },
            'dzn':  { type: 'count', toBase: 12, baseUnit: 'ea', label: 'Dozen (dzn)' }
        };

        // ==========================================
        // UTILITIES
        // ==========================================
        const formatCurrency = (value) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value || 0);
        };


        const EXPIRATION_DAYS = Array.from({ length: 31 }, (_, index) => String(index + 1).padStart(2, '0'));
        const EXPIRATION_MONTHS = [
            ['01', 'Jan'], ['02', 'Feb'], ['03', 'Mar'], ['04', 'Apr'], ['05', 'May'], ['06', 'Jun'],
            ['07', 'Jul'], ['08', 'Aug'], ['09', 'Sep'], ['10', 'Oct'], ['11', 'Nov'], ['12', 'Dec']
        ];
        const EXPIRATION_YEARS = Array.from({ length: 21 }, (_, index) => String(new Date().getFullYear() - 1 + index));

        const cleanDatePartInput = (value, maxLength) => {
            return String(value || '').replace(/\D/g, '').slice(0, maxLength);
        };

        const getExpirationParts = (value) => {
            const raw = String(value || '').trim();
            if (!raw) return { day: '', month: '', year: '' };

            const isoMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
            if (isoMatch) {
                return {
                    day: isoMatch[3].padStart(2, '0'),
                    month: isoMatch[2].padStart(2, '0'),
                    year: isoMatch[1]
                };
            }

            const parsed = new Date(raw);
            if (!Number.isNaN(parsed.getTime())) {
                return {
                    day: String(parsed.getDate()).padStart(2, '0'),
                    month: String(parsed.getMonth() + 1).padStart(2, '0'),
                    year: String(parsed.getFullYear())
                };
            }

            return { day: '', month: '', year: '' };
        };

        const hasAnyExpirationDatePart = (parts) => {
            return Boolean(String(parts?.day || '').trim() || String(parts?.month || '').trim() || String(parts?.year || '').trim());
        };

        const getExpirationDateFromParts = (parts) => {
            const day = parseInt(parts?.day, 10);
            const month = parseInt(parts?.month, 10);
            const year = parseInt(parts?.year, 10);

            if (!day && !month && !year) return '';
            if (!Number.isInteger(day) || !Number.isInteger(month) || !Number.isInteger(year)) return '';
            if (year < 1900 || year > 2999 || month < 1 || month > 12 || day < 1 || day > 31) return '';

            const candidate = new Date(year, month - 1, day);
            if (candidate.getFullYear() !== year || candidate.getMonth() !== month - 1 || candidate.getDate() !== day) return '';

            return `${String(year).padStart(4, '0')}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        };

        const normalizeImportedExpirationDate = (value) => {
            const raw = String(value || '').trim();
            if (!raw) return '';

            if (/^\d+(?:\.\d+)?$/.test(raw)) {
                const serial = Number(raw);
                if (serial > 25000 && serial < 80000) {
                    const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                    const date = new Date(excelEpoch.getTime() + Math.floor(serial) * 86400000);
                    return `${String(date.getUTCFullYear()).padStart(4, '0')}-${String(date.getUTCMonth() + 1).padStart(2, '0')}-${String(date.getUTCDate()).padStart(2, '0')}`;
                }
            }

            const fromParts = getExpirationDateFromParts(getExpirationParts(raw));
            if (fromParts) return fromParts;

            const parsed = new Date(raw);
            if (Number.isNaN(parsed.getTime())) return '';
            return `${String(parsed.getFullYear()).padStart(4, '0')}-${String(parsed.getMonth() + 1).padStart(2, '0')}-${String(parsed.getDate()).padStart(2, '0')}`;
        };

        function ExpirationDateInputs({ value, onChange }) {
            const parts = value || { day: '', month: '', year: '' };
            const updatePart = (field, rawValue, maxLength) => {
                onChange({
                    ...parts,
                    [field]: cleanDatePartInput(rawValue, maxLength)
                });
            };

            return (
                <div className="grid grid-cols-3 gap-3">
                    <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-diner-muted mb-1">Day</label>
                        <input
                            type="text"
                            inputMode="numeric"
                            list="expiration-day-options"
                            value={parts.day}
                            onChange={event => updatePart('day', event.target.value, 2)}
                            className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow"
                            placeholder="DD"
                        />
                        <datalist id="expiration-day-options">
                            {EXPIRATION_DAYS.map(day => <option key={day} value={day} />)}
                        </datalist>
                    </div>
                    <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-diner-muted mb-1">Month</label>
                        <input
                            type="text"
                            inputMode="numeric"
                            list="expiration-month-options"
                            value={parts.month}
                            onChange={event => updatePart('month', event.target.value, 2)}
                            className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow"
                            placeholder="MM"
                        />
                        <datalist id="expiration-month-options">
                            {EXPIRATION_MONTHS.map(([month, label]) => <option key={month} value={month}>{label}</option>)}
                        </datalist>
                    </div>
                    <div>
                        <label className="block text-xs font-bold uppercase tracking-wider text-diner-muted mb-1">Year</label>
                        <input
                            type="text"
                            inputMode="numeric"
                            list="expiration-year-options"
                            value={parts.year}
                            onChange={event => updatePart('year', event.target.value, 4)}
                            className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow"
                            placeholder="YYYY"
                        />
                        <datalist id="expiration-year-options">
                            {EXPIRATION_YEARS.map(year => <option key={year} value={year} />)}
                        </datalist>
                    </div>
                </div>
            );
        }

        const convertToBase = (amount, unitKey) => {
            const unitInfo = UNITS[String(unitKey || '').toLowerCase()];
            const numericAmount = toNumber(amount, 0);
            if (!unitInfo) return numericAmount;
            return numericAmount * unitInfo.toBase;
        };

        const toNumber = (value, fallback = 0) => {
            const num = typeof value === 'number' ? value : parseFloat(value);
            return Number.isFinite(num) ? num : fallback;
        };

        const normalizeItemName = (name) => String(name || '').trim().toLowerCase();
        const priceCents = (value) => Math.round(toNumber(value, 0) * 100);
        const pricesMatch = (a, b) => priceCents(a) === priceCents(b);


        const EXPIRATION_WARNING_DAYS = 7;

        const normalizeTags = (value) => {
            if (Array.isArray(value)) {
                return value.map(tag => String(tag || '').trim()).filter(Boolean);
            }
            return String(value || '')
                .split(/[,;\n]/)
                .map(tag => tag.trim())
                .filter(Boolean);
        };

        const normalizeRecipe = (recipe) => ({
            ...recipe,
            id: recipe?.id || Date.now().toString() + '_' + Math.random().toString(36).slice(2, 7),
            name: String(recipe?.name || '').trim(),
            tags: normalizeTags(recipe?.tags),
            ingredients: Array.isArray(recipe?.ingredients) ? recipe.ingredients : [],
            totalCost: toNumber(recipe?.totalCost, 0)
        });

        const parseExpirationDate = (value) => {
            const raw = String(value || '').trim();
            if (!raw) return null;
            const parsed = new Date(raw);
            if (Number.isNaN(parsed.getTime())) return null;
            parsed.setHours(23, 59, 59, 999);
            return parsed;
        };

        const getExpirationStatus = (item) => {
            const raw = String(item?.expirationDate || '').trim();
            if (!raw) return { state: 'none', label: 'No expiration date', daysUntil: null };
            const expiration = parseExpirationDate(raw);
            if (!expiration) return { state: 'unknown', label: raw, daysUntil: null };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const daysUntil = Math.ceil((expiration.getTime() - today.getTime()) / 86400000);
            if (daysUntil < 0) return { state: 'expired', label: `Expired ${Math.abs(daysUntil)} day${Math.abs(daysUntil) === 1 ? '' : 's'} ago`, daysUntil };
            if (daysUntil === 0) return { state: 'warning', label: 'Expires today', daysUntil };
            if (daysUntil <= EXPIRATION_WARNING_DAYS) return { state: 'warning', label: `Expires in ${daysUntil} day${daysUntil === 1 ? '' : 's'}`, daysUntil };
            return { state: 'ok', label: raw, daysUntil };
        };

        const isExpiredOrNearExpired = (item) => {
            const status = getExpirationStatus(item);
            return status.state === 'expired' || status.state === 'warning';
        };

        const chooseEarlierExpirationDate = (a, b) => {
            const rawA = String(a || '').trim();
            const rawB = String(b || '').trim();
            if (!rawA) return rawB;
            if (!rawB) return rawA;
            const dateA = parseExpirationDate(rawA);
            const dateB = parseExpirationDate(rawB);
            if (dateA && dateB) return dateA <= dateB ? rawA : rawB;
            return rawA;
        };

        const calculateCostPerBaseUnit = (totalPrice, totalBaseUnits) => {
            const units = toNumber(totalBaseUnits, 0);
            if (units <= 0) return 0;
            return toNumber(totalPrice, 0) / units;
        };

        const normalizePreferredUnit = (unitKey, baseUnitFallback = 'ea', allowDozen = true) => {
            const key = String(unitKey || '').toLowerCase();
            if (UNITS[key] && (allowDozen || key !== 'dzn')) return key;
            const fallback = Object.entries(UNITS).find(([candidateKey, unit]) => {
                return unit.baseUnit === baseUnitFallback && (allowDozen || candidateKey !== 'dzn');
            });
            return fallback ? fallback[0] : 'ea';
        };

        const getItemPreferredUnit = (item, allowDozen = true) => {
            return normalizePreferredUnit(
                item?.preferredUnit || item?.inputUnit || item?.purchaseUnit || item?.baseUnit,
                item?.baseUnit || 'ea',
                allowDozen
            );
        };

        const getUnitEntriesForBaseUnit = (baseUnit, options = {}) => {
            const { excludeDozen = false } = options;
            return Object.entries(UNITS).filter(([key, unit]) => {
                return unit.baseUnit === baseUnit && (!excludeDozen || key !== 'dzn');
            });
        };

        const getBaseUnitLabel = (baseUnit) => {
            if (baseUnit === 'g') return 'weight';
            if (baseUnit === 'ml') return 'volume';
            if (baseUnit === 'ea') return 'count';
            return baseUnit || 'unit';
        };

        const getKitchenUnitEntriesForItem = () => {
            return Object.entries(UNITS).filter(([key]) => key !== 'dzn');
        };

        const getKitchenDefaultUnitForItem = (item) => {
            if (!item) return 'g';
            const itemBaseUnit = item.baseUnit || UNITS[getItemPreferredUnit(item)]?.baseUnit || 'ea';
            const preferred = getItemPreferredUnit(item, false);
            if (UNITS[preferred] && UNITS[preferred].baseUnit === itemBaseUnit) return preferred;
            return normalizePreferredUnit(null, itemBaseUnit, false);
        };

        const convertIngredientForItem = (amount, unitKey, item) => {
            const qty = toNumber(amount, NaN);
            const unitInfo = UNITS[String(unitKey || '').toLowerCase()];
            const normalizedItem = normalizeInventoryItem(item || {});
            const itemBaseUnit = normalizedItem.baseUnit || 'ea';

            if (!Number.isFinite(qty) || qty <= 0 || !unitInfo) {
                return {
                    baseQty: 0,
                    baseUnitType: itemBaseUnit,
                    cost: 0,
                    isEstimated: false,
                    conversionNote: ''
                };
            }

            let baseQty = qty * unitInfo.toBase;
            let isEstimated = false;
            let conversionNote = '';

            if (unitInfo.baseUnit !== itemBaseUnit) {
                isEstimated = true;

                if ((unitInfo.baseUnit === 'ml' && itemBaseUnit === 'g') || (unitInfo.baseUnit === 'g' && itemBaseUnit === 'ml')) {
                    // This keeps cross-family kitchen measurements usable when a recipe is written by volume
                    // but the pantry purchase was entered by weight, or vice versa. Without a density/yield value
                    // for each individual ingredient, no app can make this conversion perfectly. A 1 ml ≈ 1 g
                    // fallback keeps the math stable and transparent instead of blocking the recipe.
                    baseQty = qty * unitInfo.toBase;
                    conversionNote = `Estimated mixed ${getBaseUnitLabel(unitInfo.baseUnit)} → ${getBaseUnitLabel(itemBaseUnit)} conversion using 1 ml ≈ 1 g.`;
                } else {
                    const preferredUnit = getItemPreferredUnit(normalizedItem, false);
                    const preferredInfo = UNITS[preferredUnit] || UNITS[itemBaseUnit] || { toBase: 1, label: itemBaseUnit };
                    baseQty = qty * preferredInfo.toBase;
                    conversionNote = `Estimated mixed-unit conversion using this item's ${preferredInfo.label || preferredUnit} pricing scale.`;
                }
            }

            return {
                baseQty,
                baseUnitType: itemBaseUnit,
                cost: baseQty * normalizedItem.costPerBaseUnit,
                isEstimated,
                conversionNote
            };
        };

        const normalizeInventoryItem = (item) => {
            const preferredUnit = getItemPreferredUnit(item, true);
            const preferredUnitInfo = UNITS[preferredUnit] || UNITS.ea;
            const baseUnit = item?.baseUnit || preferredUnitInfo.baseUnit;
            const totalPrice = Math.max(0, toNumber(item?.totalPrice, 0));
            const purchasePrice = Math.max(0, toNumber(item?.purchasePrice, totalPrice));
            const totalBaseUnits = Math.max(0, toNumber(item?.totalBaseUnits, 0));
            const costPerBaseUnit = calculateCostPerBaseUnit(totalPrice, totalBaseUnits);
            const expirationDate = String(item?.expirationDate || '').trim();

            return {
                ...item,
                id: item?.id || Date.now().toString() + '_' + Math.random().toString(36).slice(2, 7),
                name: String(item?.name || '').trim(),
                totalPrice,
                purchasePrice,
                totalBaseUnits,
                baseUnit,
                preferredUnit,
                expirationDate,
                originalSizeString: item?.originalSizeString || `${totalBaseUnits / (preferredUnitInfo.toBase || 1)} ${preferredUnit}`,
                costPerBaseUnit
            };
        };

        const mergeInventoryItems = (existingItem, incomingItem) => {
            const existing = normalizeInventoryItem(existingItem);
            const incoming = normalizeInventoryItem(incomingItem);
            const totalPrice = existing.totalPrice + incoming.totalPrice;
            const totalBaseUnits = existing.totalBaseUnits + incoming.totalBaseUnits;

            return normalizeInventoryItem({
                ...existing,
                totalPrice,
                totalBaseUnits,
                purchasePrice: existing.purchasePrice,
                preferredUnit: existing.preferredUnit || incoming.preferredUnit,
                expirationDate: chooseEarlierExpirationDate(existing.expirationDate, incoming.expirationDate),
                originalSizeString: existing.originalSizeString || incoming.originalSizeString
            });
        };

        const mergeNewItemsIntoInventory = (currentInventory, newItems, options = {}) => {
            const excludeIds = new Set(options.excludeIds || []);
            const mergedInventory = currentInventory
                .filter(item => !excludeIds.has(item.id))
                .map(normalizeInventoryItem);
            const conflicts = [];

            for (const rawItem of newItems) {
                const incoming = normalizeInventoryItem(rawItem);
                const incomingName = normalizeItemName(incoming.name);

                if (!incomingName) {
                    conflicts.push('One item is missing a name.');
                    continue;
                }

                if (incoming.totalBaseUnits <= 0) {
                    conflicts.push(`${incoming.name} needs a quantity greater than 0.`);
                    continue;
                }

                const existingIndex = mergedInventory.findIndex(item => normalizeItemName(item.name) === incomingName);
                if (existingIndex === -1) {
                    mergedInventory.push(incoming);
                    continue;
                }

                const existing = mergedInventory[existingIndex];
                if (!pricesMatch(existing.purchasePrice, incoming.purchasePrice)) {
                    conflicts.push(`${incoming.name} already exists in the pantry at ${formatCurrency(existing.purchasePrice)}. You cannot add the exact same name at ${formatCurrency(incoming.purchasePrice)}.`);
                    continue;
                }

                if (existing.baseUnit !== incoming.baseUnit) {
                    conflicts.push(`${incoming.name} already exists with a ${existing.baseUnit} base unit, so it cannot be merged with a ${incoming.baseUnit} item.`);
                    continue;
                }

                mergedInventory[existingIndex] = mergeInventoryItems(existing, incoming);
            }

            return { inventory: mergedInventory, conflicts };
        };

        // Formats the base units (g, ml) back into readable US measurements for the UI
        const formatUnitDisplay = (baseUnits, baseUnitType) => {
            const val = parseFloat(baseUnits);
            if (isNaN(val) || val <= 0) return `0 ${baseUnitType === 'ea' ? 'ea' : baseUnitType === 'g' ? 'oz' : 'fl oz'}`;
            
            if (baseUnitType === 'g') {
                const lbs = Math.floor(val / 453.592);
                const remainingG = val - (lbs * 453.592);
                const oz = remainingG / 28.3495;
                
                let parts = [];
                if (lbs > 0) parts.push(`${lbs} lb`);
                if (oz >= 0.1 || lbs === 0) {
                    parts.push(`${oz.toFixed(1).replace(/\.0$/, '')} oz`);
                }
                return parts.join(', ');
            }
            if (baseUnitType === 'ml') {
                const gal = Math.floor(val / 3785.41);
                let rem = val - (gal * 3785.41);
                const qt = Math.floor(rem / 946.353);
                rem = rem - (qt * 946.353);
                const cup = Math.floor(rem / 236.588);
                rem = rem - (cup * 236.588);
                const flOz = rem / 29.5735;

                let parts = [];
                if (gal > 0) parts.push(`${gal} gal`);
                if (qt > 0) parts.push(`${qt} qt`);
                if (cup > 0) parts.push(`${cup} cup`);
                if (flOz >= 0.1 || (gal === 0 && qt === 0 && cup === 0)) {
                    parts.push(`${flOz.toFixed(1).replace(/\.0$/, '')} fl oz`);
                }
                return parts.join(', ');
            }
            return `${parseFloat(val.toFixed(2))} ${baseUnitType}`;
        };

        // Flexible Resupply Import Parsers
        const SUPPORTED_RESUPPLY_ACCEPT = [
            '.csv', '.tsv', '.txt', '.tab', '.psv', '.pipe', '.dat',
            '.xlsx', '.xls', '.xlsm', '.xlsb', '.ods', '.fods',
            '.html', '.htm', '.xml', '.json',
            'text/csv', 'text/tab-separated-values', 'text/plain',
            'application/json', 'application/vnd.ms-excel',
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'application/vnd.oasis.opendocument.spreadsheet'
        ].join(',');

        const SPREADSHEET_EXTENSIONS = new Set(['xlsx', 'xls', 'xlsm', 'xlsb', 'ods', 'fods', 'csv', 'tsv', 'tab', 'dif', 'sylk', 'slk']);
        const TEXT_TABLE_EXTENSIONS = new Set(['csv', 'tsv', 'txt', 'tab', 'psv', 'pipe', 'dat', 'text']);
        const UI_PREFS_DB_NAME = 'hickory-house-ui-preferences';
        const UI_PREFS_STORE_NAME = 'preferences';
        const HIDE_IGNORED_COLUMNS_PREF_KEY = 'resupply.hideIgnoredColumns';

        const openUiPrefsDb = () => {
            return new Promise((resolve, reject) => {
                if (!('indexedDB' in window)) {
                    reject(new Error('IndexedDB is not available.'));
                    return;
                }

                const request = indexedDB.open(UI_PREFS_DB_NAME, 1);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(UI_PREFS_STORE_NAME)) {
                        db.createObjectStore(UI_PREFS_STORE_NAME, { keyPath: 'key' });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error || new Error('Could not open UI preferences database.'));
            });
        };

        const readUiPreference = async (key, fallbackValue) => {
            try {
                const db = await openUiPrefsDb();
                return await new Promise((resolve, reject) => {
                    const tx = db.transaction(UI_PREFS_STORE_NAME, 'readonly');
                    const store = tx.objectStore(UI_PREFS_STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result ? request.result.value : fallbackValue);
                    request.onerror = () => reject(request.error || new Error('Could not read UI preference.'));
                    tx.oncomplete = () => db.close();
                    tx.onerror = () => {
                        db.close();
                        reject(tx.error || new Error('UI preference transaction failed.'));
                    };
                });
            } catch (err) {
                try {
                    const stored = window.localStorage?.getItem(key);
                    return stored === null || stored === undefined ? fallbackValue : JSON.parse(stored);
                } catch (fallbackErr) {
                    return fallbackValue;
                }
            }
        };

        const writeUiPreference = async (key, value) => {
            try {
                const db = await openUiPrefsDb();
                await new Promise((resolve, reject) => {
                    const tx = db.transaction(UI_PREFS_STORE_NAME, 'readwrite');
                    tx.objectStore(UI_PREFS_STORE_NAME).put({ key, value, updatedAt: new Date().toISOString() });
                    tx.oncomplete = () => {
                        db.close();
                        resolve();
                    };
                    tx.onerror = () => {
                        db.close();
                        reject(tx.error || new Error('Could not save UI preference.'));
                    };
                });
            } catch (err) {
                try {
                    window.localStorage?.setItem(key, JSON.stringify(value));
                } catch (fallbackErr) {
                    // UI preference persistence is best-effort only.
                }
            }
        };

        const getFileExtension = (filename = '') => {
            const clean = String(filename || '').toLowerCase().split('?')[0].split('#')[0];
            const dotIndex = clean.lastIndexOf('.');
            return dotIndex === -1 ? '' : clean.slice(dotIndex + 1);
        };

        const normalizeImportCell = (value) => {
            if (value === null || value === undefined) return '';
            if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().slice(0, 10);
            return String(value).replace(/\u00A0/g, ' ').trim();
        };

        const normalizeImportedRows = (rows) => {
            return (rows || [])
                .map(row => Array.isArray(row) ? row.map(normalizeImportCell) : [normalizeImportCell(row)])
                .map(row => {
                    let end = row.length;
                    while (end > 0 && !String(row[end - 1] || '').trim()) end--;
                    return row.slice(0, end);
                })
                .filter(row => row.some(cell => String(cell || '').trim()));
        };

        const countDelimiterOutsideQuotes = (line, delimiter) => {
            let count = 0;
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === delimiter && !inQuotes) {
                    count++;
                }
            }
            return count;
        };

        const detectDelimiter = (text) => {
            const sampleLines = String(text || '')
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .slice(0, 12);

            if (sampleLines.length === 0) return ',';

            const delimiters = ['\t', ',', ';', '|'];
            let bestDelimiter = ',';
            let bestScore = -1;

            for (const delimiter of delimiters) {
                const counts = sampleLines.map(line => countDelimiterOutsideQuotes(line, delimiter)).filter(count => count > 0);
                if (counts.length === 0) continue;
                const average = counts.reduce((sum, count) => sum + count, 0) / counts.length;
                const consistency = counts.filter(count => Math.abs(count - average) <= 1).length / counts.length;
                const score = average * consistency * counts.length;
                if (score > bestScore) {
                    bestScore = score;
                    bestDelimiter = delimiter;
                }
            }

            return bestDelimiter;
        };

        const parseDelimitedLine = (line, delimiter) => {
            const row = [];
            let inQuotes = false;
            let currentVal = '';

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        currentVal += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === delimiter && !inQuotes) {
                    row.push(currentVal.trim());
                    currentVal = '';
                } else {
                    currentVal += char;
                }
            }

            row.push(currentVal.trim());
            return row;
        };

        // Accurate fallback parser for CSV, TSV, semicolon, and pipe-delimited text.
        const parseDelimitedText = (text) => {
            const raw = String(text || '').replace(/^\uFEFF/, '');
            const lines = raw.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) return [];

            const delimiter = detectDelimiter(raw);
            return normalizeImportedRows(lines.map(line => parseDelimitedLine(line, delimiter)));
        };

        const rowsFromObjects = (objects) => {
            const records = (objects || []).filter(item => item && typeof item === 'object' && !Array.isArray(item));
            if (records.length === 0) return [];

            const preferredOrder = [
                'name', 'item', 'itemName', 'product', 'description', 'desc',
                'size', 'pack', 'packSize', 'quantity', 'qty', 'unit', 'uom',
                'price', 'totalPrice', 'cost', 'total', 'amount'
            ];

            const keySet = new Set();
            for (const key of preferredOrder) {
                if (records.some(record => Object.prototype.hasOwnProperty.call(record, key))) keySet.add(key);
            }
            for (const record of records) {
                Object.keys(record).forEach(key => keySet.add(key));
            }

            const keys = Array.from(keySet);
            const rows = [keys];

            for (const record of records) {
                rows.push(keys.map(key => normalizeImportCell(record[key])));
            }

            return normalizeImportedRows(rows);
        };

        const inventoryObjectsToRows = (items) => {
            const rows = [['Item Name', 'Pack Size', 'Total Price']];
            for (const item of items || []) {
                if (!item || typeof item !== 'object') continue;
                const name = item.name || item.item || item.itemName || item.product || item.description || '';
                const size = item.originalSizeString
                    || item.packSize
                    || item.size
                    || (item.totalBaseUnits && item.baseUnit ? `${item.totalBaseUnits} ${item.baseUnit}` : '')
                    || (item.quantity && item.unit ? `${item.quantity} ${item.unit}` : '');
                const price = item.totalPrice ?? item.price ?? item.cost ?? item.total ?? '';
                rows.push([name, size, price]);
            }
            return normalizeImportedRows(rows);
        };

        const parseJsonRowsFromText = (text) => {
            const parsed = JSON.parse(text);

            if (Array.isArray(parsed)) {
                if (parsed.every(row => Array.isArray(row))) return normalizeImportedRows(parsed);
                if (parsed.every(row => row && typeof row === 'object')) return rowsFromObjects(parsed);
            }

            if (parsed && typeof parsed === 'object') {
                if (Array.isArray(parsed.inventory)) return inventoryObjectsToRows(parsed.inventory);

                const candidateKeys = ['items', 'products', 'rows', 'data', 'records', 'inventoryItems'];
                for (const key of candidateKeys) {
                    if (!Array.isArray(parsed[key])) continue;
                    const value = parsed[key];
                    if (value.every(row => Array.isArray(row))) return normalizeImportedRows(value);
                    if (value.every(row => row && typeof row === 'object')) return rowsFromObjects(value);
                }
            }

            throw new Error('JSON did not contain an inventory array, table rows, or object records.');
        };

        const parseHtmlRowsFromText = (text) => {
            const doc = new DOMParser().parseFromString(String(text || ''), 'text/html');
            const tables = Array.from(doc.querySelectorAll('table'));
            const rows = [];

            for (const table of tables) {
                const tableRows = Array.from(table.querySelectorAll('tr')).map(tr => {
                    return Array.from(tr.querySelectorAll('th,td')).map(cell => normalizeImportCell(cell.textContent));
                });
                rows.push(...tableRows);
            }

            if (rows.length > 0) return normalizeImportedRows(rows);

            const plainText = normalizeImportCell(doc.body?.innerText || doc.body?.textContent || text);
            return parseDelimitedText(plainText);
        };

        const parseXmlRowsFromText = (text) => {
            const doc = new DOMParser().parseFromString(String(text || ''), 'application/xml');
            if (doc.querySelector('parsererror')) {
                throw new Error('XML file could not be parsed.');
            }

            const rowSelectors = ['row', 'item', 'product', 'record', 'inventoryItem'];
            let nodes = [];

            for (const selector of rowSelectors) {
                nodes = Array.from(doc.getElementsByTagName(selector));
                if (nodes.length > 0) break;
            }

            if (nodes.length === 0) {
                const children = Array.from(doc.documentElement?.children || []);
                const grouped = children.reduce((map, node) => {
                    const tag = node.tagName;
                    map[tag] = (map[tag] || 0) + 1;
                    return map;
                }, {});
                const repeatedTag = Object.keys(grouped).find(tag => grouped[tag] > 1);
                if (repeatedTag) nodes = Array.from(doc.getElementsByTagName(repeatedTag));
            }

            if (nodes.length === 0) throw new Error('XML did not contain recognizable rows.');

            const objects = nodes.map(node => {
                const record = {};
                for (const child of Array.from(node.children || [])) {
                    record[child.tagName] = normalizeImportCell(child.textContent);
                }
                if (Object.keys(record).length === 0) {
                    record.value = normalizeImportCell(node.textContent);
                }
                return record;
            });

            return rowsFromObjects(objects);
        };

        const parseSpreadsheetRowsFromArrayBuffer = (arrayBuffer, filename = '') => {
            if (!window.XLSX) {
                throw new Error('Spreadsheet parser did not load. Try CSV/TSV/JSON, or check internet access and reload.');
            }

            const workbook = XLSX.read(arrayBuffer, {
                type: 'array',
                raw: false,
                cellDates: true,
                dense: false,
                WTF: false
            });

            const combinedRows = [];
            for (const sheetName of workbook.SheetNames || []) {
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) continue;
                const rows = XLSX.utils.sheet_to_json(sheet, {
                    header: 1,
                    defval: '',
                    blankrows: false,
                    raw: false
                });
                const normalizedRows = normalizeImportedRows(rows);
                if (normalizedRows.length > 0) {
                    if (combinedRows.length > 0) combinedRows.push([]);
                    combinedRows.push(...normalizedRows);
                }
            }

            const cleaned = normalizeImportedRows(combinedRows);
            if (cleaned.length === 0) throw new Error(`${filename || 'Spreadsheet'} did not contain readable rows.`);
            return cleaned;
        };

        const readFileAsText = async (file) => {
            if (file && typeof file.text === 'function') return await file.text();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(reader.error || new Error('Unable to read file.'));
                reader.readAsText(file);
            });
        };

        const parseResupplyFile = async (file) => {
            const extension = getFileExtension(file.name);
            const lowerName = String(file.name || '').toLowerCase();

            if (extension === 'json') {
                return parseJsonRowsFromText(await readFileAsText(file));
            }

            if (extension === 'html' || extension === 'htm') {
                return parseHtmlRowsFromText(await readFileAsText(file));
            }

            if (extension === 'xml') {
                return parseXmlRowsFromText(await readFileAsText(file));
            }

            if (SPREADSHEET_EXTENSIONS.has(extension) && window.XLSX && typeof file.arrayBuffer === 'function') {
                return parseSpreadsheetRowsFromArrayBuffer(await file.arrayBuffer(), file.name);
            }

            if (TEXT_TABLE_EXTENSIONS.has(extension) || lowerName.endsWith('.csv') || lowerName.endsWith('.txt')) {
                return parseDelimitedText(await readFileAsText(file));
            }

            // Last-chance import: try spreadsheet first, then text. This helps with extensionless exports.
            if (window.XLSX && typeof file.arrayBuffer === 'function') {
                try {
                    return parseSpreadsheetRowsFromArrayBuffer(await file.arrayBuffer(), file.name);
                } catch (err) {
                    // Continue to text fallback.
                }
            }

            return parseDelimitedText(await readFileAsText(file));
        };

        const getAutoColumnMap = (rows) => {
            const normalizedRows = normalizeImportedRows(rows);
            const maxCols = Math.max(0, ...normalizedRows.slice(0, 8).map(row => row.length));
            const sampleRows = normalizedRows.slice(0, 8);
            const scores = [];

            const scoreText = (text, role) => {
                const value = String(text || '').toLowerCase();
                if (!value) return 0;

                const nameTerms = [
                    ['item name', 10], ['product name', 10], ['description', 9], ['desc', 7],
                    ['item', 8], ['product', 7], ['ingredient', 7], ['name', 6], ['material', 5]
                ];
                const sizeTerms = [
                    ['pack size', 10], ['case pack', 9], ['size', 8], ['pack', 8],
                    ['quantity', 7], ['qty', 7], ['amount used', 4], ['amount', 3],
                    ['unit', 6], ['uom', 7], ['weight', 6], ['volume', 6], ['measure', 6]
                ];
                const priceTerms = [
                    ['total price', 12], ['extended price', 12], ['invoice total', 10],
                    ['price', 10], ['cost', 10], ['total cost', 11], ['amount due', 8],
                    ['line total', 10], ['ext', 5], ['value', 4], ['charge', 5]
                ];
                const expirationTerms = [
                    ['expiration date', 14], ['expiration', 12], ['expire date', 12], ['exp date', 12],
                    ['expires', 10], ['expire', 9], ['best by', 10], ['use by', 10], ['sell by', 9],
                    ['date code', 6], ['date', 4]
                ];

                const roleTerms = {
                    name: nameTerms,
                    size: sizeTerms,
                    price: priceTerms,
                    expiration: expirationTerms
                };
                const terms = roleTerms[role] || [];
                const keywordScore = terms.reduce((sum, [term, weight]) => value.includes(term) ? sum + weight : sum, 0);
                const looksLikeDate = role === 'expiration' && (
                    /\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(value) ||
                    /\d{1,2}[-/]\d{1,2}[-/]\d{2,4}/.test(value)
                );
                return keywordScore + (looksLikeDate ? 6 : 0);
            };

            for (let colIndex = 0; colIndex < maxCols; colIndex++) {
                const text = sampleRows.map(row => row[colIndex] || '').join(' ');
                scores.push({
                    colIndex,
                    name: scoreText(text, 'name'),
                    size: scoreText(text, 'size'),
                    price: scoreText(text, 'price'),
                    expiration: scoreText(text, 'expiration')
                });
            }

            const chosen = {};
            const used = new Set();

            const pick = (role) => {
                const best = scores
                    .filter(score => !used.has(score.colIndex))
                    .sort((a, b) => b[role] - a[role])[0];

                if (best && best[role] > 0) {
                    chosen[best.colIndex] = role;
                    used.add(best.colIndex);
                }
            };

            pick('expiration');
            pick('price');
            pick('size');
            pick('name');

            if (!Object.values(chosen).includes('name') && maxCols >= 1) chosen[0] = 'name';
            if (!Object.values(chosen).includes('size') && maxCols >= 2) chosen[1] = 'size';
            if (!Object.values(chosen).includes('price') && maxCols >= 3) chosen[2] = 'price';

            return chosen;
        };

        
        // Heuristic Parser to convert strings like "6/1.5 LB" into base units
        const parsePackSizeString = (sizeStr) => {
            if (!sizeStr) {
                return {
                    baseUnit: 'ea',
                    preferredUnit: 'ea',
                    totalBaseUnits: 1,
                    displayQuantity: 1,
                    displayUnit: 'ea'
                };
            }

            const raw = sizeStr.toString().trim();
            const str = raw.toUpperCase().replace(/×/g, 'X');
            let matchedUnitKey = null;
            let matchedUnit = null;
            const unitKeys = Object.keys(UNITS).sort((a, b) => b.length - a.length);

            const escapeRegexText = (value) => {
                const specialChars = new Set(['\\', '^', '$', '.', '|', '?', '*', '+', '(', ')', '[', ']', '{', '}']);
                return String(value || '').split('').map(char => specialChars.has(char) ? '\\' + char : char).join('');
            };

            const escapeUnitForRegex = (value) => {
                return String(value || '')
                    .toUpperCase()
                    .trim()
                    .split(/\s+/)
                    .map(part => escapeRegexText(part))
                    .join('\\s+');
            };


            for (let key of unitKeys) {
                const escapedKey = escapeUnitForRegex(key);
                const regex = new RegExp(`\\b${escapedKey}\\b`);
                if (regex.test(str)) {
                    matchedUnitKey = key;
                    matchedUnit = UNITS[key];
                    break;
                }
            }

            if (!matchedUnit) {
                matchedUnitKey = 'ea';
                matchedUnit = UNITS.ea;
            }

            const numberPattern = '(\\d+(?:\\.\\d+)?)';
            const unitPattern = escapeUnitForRegex(matchedUnitKey);
            let displayQuantity = 1;

            const casePackSlash = new RegExp(`${numberPattern}\\s*/\\s*${numberPattern}\\s*${unitPattern}`);
            const casePackX = new RegExp(`${numberPattern}\\s*(?:X|x|PK|PACK|CASE|CS|CT)?\\s*${numberPattern}\\s*${unitPattern}`);
            const simpleFraction = new RegExp(`^(?:[^0-9]*)${numberPattern}\\s*/\\s*${numberPattern}\\s*${unitPattern}`);
            const simpleQty = new RegExp(`${numberPattern}\\s*${unitPattern}`);

            const slashMatch = str.match(casePackSlash);
            const fractionMatch = str.match(simpleFraction);
            const xMatch = str.match(casePackX);
            const qtyMatch = str.match(simpleQty);

            if (slashMatch) {
                const first = parseFloat(slashMatch[1]);
                const second = parseFloat(slashMatch[2]);
                // Food-service pack sizes commonly use 6/1.5 LB to mean six 1.5 lb packs.
                // A leading 1 with a larger denominator is usually a true fraction, such as 1/2 LB.
                if (first === 1 && second > 1 && !String(slashMatch[2]).includes('.')) {
                    displayQuantity = first / second;
                } else {
                    displayQuantity = first * second;
                }
            } else if (xMatch && xMatch[1] !== xMatch[2]) {
                displayQuantity = parseFloat(xMatch[1]) * parseFloat(xMatch[2]);
            } else if (fractionMatch) {
                displayQuantity = parseFloat(fractionMatch[1]) / parseFloat(fractionMatch[2]);
            } else if (qtyMatch) {
                displayQuantity = parseFloat(qtyMatch[1]);
            } else {
                const numbers = str.replace(/#/g, '').match(/\d+(?:\.\d+)?/g);
                displayQuantity = numbers ? parseFloat(numbers[0]) : 1;
            }

            if (!Number.isFinite(displayQuantity) || displayQuantity <= 0) displayQuantity = 1;

            return {
                baseUnit: matchedUnit.baseUnit,
                preferredUnit: matchedUnitKey,
                totalBaseUnits: displayQuantity * matchedUnit.toBase,
                displayQuantity,
                displayUnit: matchedUnitKey
            };
        };

        // ==========================================
        // MAIN COMPONENT
        // ==========================================
        function App() {
            const supportsDirectoryPicker = typeof window.showDirectoryPicker === 'function';
            const supportsFolderUpload = (() => {
                try {
                    const input = document.createElement('input');
                    return 'webkitdirectory' in input || 'directory' in input;
                } catch (err) {
                    return false;
                }
            })();
            const [dirHandle, setDirHandle] = useState(null);
            const [storageMode, setStorageMode] = useState(null); // folder | portable
            const [isCheckingAccess, setIsCheckingAccess] = useState(true);
            const [inventory, setInventory] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [logs, setLogs] = useState([]);
            const [currentView, setCurrentView] = useState('pantry');
            const [error, setError] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [unsavedChanges, setUnsavedChanges] = useState(false);
            const [lastStorageMessage, setLastStorageMessage] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isGuideOpen, setIsGuideOpen] = useState(false);
            const portableFileInputRef = useRef(null);
            const portableFolderInputRef = useRef(null);

            useEffect(() => {
                document.body.classList.toggle('dark-mode', isDarkMode);
            }, [isDarkMode]);

            useEffect(() => {
                const handleKeyDown = (event) => {
                    if (event.key === 'Escape') {
                        setIsSidebarOpen(false);
                        setIsGuideOpen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                if (!portableFolderInputRef.current) return;
                portableFolderInputRef.current.setAttribute('webkitdirectory', '');
                portableFolderInputRef.current.setAttribute('directory', '');
            }, [isCheckingAccess, storageMode]);

            useEffect(() => {
                const warnBeforeLeaving = (event) => {
                    if (storageMode !== 'portable' || !unsavedChanges) return;
                    event.preventDefault();
                    event.returnValue = '';
                };
                window.addEventListener('beforeunload', warnBeforeLeaving);
                return () => window.removeEventListener('beforeunload', warnBeforeLeaving);
            }, [storageMode, unsavedChanges]);

            const toggleDarkMode = () => {
                setIsDarkMode(prev => !prev);
            };

            useEffect(() => {
                setIsCheckingAccess(false);
            }, []);

            const readFileText = async (file) => {
                if (file && typeof file.text === 'function') return await file.text();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result || ''));
                    reader.onerror = () => reject(reader.error || new Error('Unable to read file.'));
                    reader.readAsText(file);
                });
            };

            const normalizeLoadedData = (payload = {}) => {
                return {
                    inventory: Array.isArray(payload.inventory) ? payload.inventory.map(normalizeInventoryItem) : [],
                    recipes: Array.isArray(payload.recipes) ? payload.recipes.map(normalizeRecipe) : [],
                    logs: Array.isArray(payload.logs) ? payload.logs : []
                };
            };

            const applyLoadedData = (payload, mode, message = '') => {
                const next = normalizeLoadedData(payload);
                setInventory(next.inventory);
                setRecipes(next.recipes);
                setLogs(next.logs);
                setStorageMode(mode);
                setUnsavedChanges(false);
                setLastStorageMessage(message);
                setCurrentView('pantry');
                setError(null);
            };

            const requestAccess = async () => {
                if (!supportsDirectoryPicker) {
                    if (supportsFolderUpload && portableFolderInputRef.current) {
                        portableFolderInputRef.current.click();
                    } else {
                        portableFileInputRef.current?.click();
                    }
                    return;
                }

                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setDirHandle(handle);
                    setStorageMode('folder');
                    await loadData(handle);
                    setUnsavedChanges(false);
                    setLastStorageMessage('Folder connected.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Failed to get folder access: ' + err.message);
                }
            };

            const handleChooseFolder = () => {
                setError(null);

                if (supportsDirectoryPicker) {
                    requestAccess();
                    return;
                }

                if (supportsFolderUpload && portableFolderInputRef.current) {
                    portableFolderInputRef.current.click();
                    return;
                }

                portableFileInputRef.current?.click();
            };

            const startPortableMode = () => {
                applyLoadedData({ inventory: [], recipes: [], logs: [] }, 'portable', 'Portable mode started.');
            };

            const handlePortableFilesUpload = async (event) => {
                const files = Array.from(event.target.files || []);
                event.target.value = '';
                if (files.length === 0) return;

                try {
                    const loaded = { inventory: [], recipes: [], logs: [] };
                    let foundKnownFile = false;

                    for (const file of files) {
                        const text = await readFileText(file);
                        if (!text.trim()) continue;
                        const parsed = JSON.parse(text);
                        const filename = String(file.name || '').toLowerCase();

                        if (!Array.isArray(parsed) && (Array.isArray(parsed.inventory) || Array.isArray(parsed.recipes) || Array.isArray(parsed.logs))) {
                            loaded.inventory = Array.isArray(parsed.inventory) ? parsed.inventory : loaded.inventory;
                            loaded.recipes = Array.isArray(parsed.recipes) ? parsed.recipes : loaded.recipes;
                            loaded.logs = Array.isArray(parsed.logs) ? parsed.logs : loaded.logs;
                            foundKnownFile = true;
                            continue;
                        }

                        if (filename.includes('inventory') && Array.isArray(parsed)) {
                            loaded.inventory = parsed;
                            foundKnownFile = true;
                        } else if ((filename.includes('recipe') || filename.includes('dish')) && Array.isArray(parsed)) {
                            loaded.recipes = parsed;
                            foundKnownFile = true;
                        } else if (filename.includes('log') && Array.isArray(parsed)) {
                            loaded.logs = parsed;
                            foundKnownFile = true;
                        }
                    }

                    if (!foundKnownFile) {
                        const selectedFolderPath = files.find(file => String(file.webkitRelativePath || '').includes('/'))?.webkitRelativePath || '';
                        if (selectedFolderPath) {
                            applyLoadedData(loaded, 'portable', 'Folder opened.');
                            return;
                        }
                        throw new Error('No supported Hickory House backup, inventory.json, or recipes.json file was found.');
                    }

                    applyLoadedData(loaded, 'portable', 'Folder opened.');
                } catch (err) {
                    console.error('Portable import error:', err);
                    setError('Could not import the selected file(s): ' + err.message);
                }
            };

            const loadData = async (handle) => {
                try {
                    const nextData = { inventory: [], recipes: [], logs: [] };

                    try {
                        const fileHandle = await handle.getFileHandle('inventory.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if (text.trim()) {
                            const parsed = JSON.parse(text);
                            nextData.inventory = Array.isArray(parsed) ? parsed.map(normalizeInventoryItem) : [];
                        }
                    } catch (e) {
                        nextData.inventory = [];
                    }

                    try {
                        const fileHandle = await handle.getFileHandle('recipes.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if (text.trim()) {
                            const parsed = JSON.parse(text);
                            nextData.recipes = Array.isArray(parsed) ? parsed.map(normalizeRecipe) : [];
                        }
                    } catch (e) {
                        nextData.recipes = [];
                    }

                    try {
                        const fileHandle = await handle.getFileHandle('logs.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if(text.trim()) nextData.logs = JSON.parse(text);
                    } catch (e) {
                        nextData.logs = [];
                    }

                    setInventory(nextData.inventory);
                    setRecipes(nextData.recipes);
                    setLogs(Array.isArray(nextData.logs) ? nextData.logs : []);
                } catch (err) {
                    console.error('Error loading data', err);
                    setError('Could not read files from the selected directory.');
                }
            };

            const buildPortableBackup = (overrides = {}) => ({
                app: 'Hickory House Inventory',
                version: 2,
                exportedAt: new Date().toISOString(),
                inventory: (overrides.inventory || inventory).map(normalizeInventoryItem),
                recipes: (overrides.recipes || recipes).map(normalizeRecipe),
                recipes: (overrides.recipes || recipes).map(normalizeRecipe)
            });

            const saveJsonBlob = async (filename, payload) => {
                const json = JSON.stringify(payload, null, 2);
                const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
                let shareFile = null;

                try {
                    if (typeof File === 'function') {
                        shareFile = new File([blob], filename, { type: 'application/json' });
                    }
                } catch (err) {
                    shareFile = null;
                }

                try {
                    if (shareFile && navigator.canShare && navigator.share && navigator.canShare({ files: [shareFile] })) {
                        await navigator.share({
                            files: [shareFile],
                            title: 'Hickory House Backup',
                            text: 'Save this Hickory House inventory backup to Files, iCloud Drive, or another safe location.'
                        });
                        return;
                    }
                } catch (err) {
                    // Fall through to the standard download path.
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.rel = 'noopener';
                document.body.appendChild(link);
                link.click();
                link.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };

            const downloadBackup = async () => {
                try {
                    const dateStamp = new Date().toISOString().slice(0, 10);
                    await saveJsonBlob(`hickory-house-backup-${dateStamp}.json`, buildPortableBackup());
                    setUnsavedChanges(false);
                    setLastStorageMessage('Backup copy downloaded.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Could not export backup: ' + err.message);
                }
            };

            const downloadSeparateJsonFiles = async () => {
                try {
                    await saveJsonBlob('inventory.json', inventory.map(normalizeInventoryItem));
                    await saveJsonBlob('recipes.json', recipes.map(normalizeRecipe));
                    setUnsavedChanges(false);
                    setLastStorageMessage('Data files downloaded.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Could not export JSON files: ' + err.message);
                }
            };

            const saveData = async (type, data) => {
                const normalizedData = type === 'inventory'
                    ? data.map(normalizeInventoryItem)
                    : type === 'recipes'
                        ? data.map(normalizeRecipe)
                        : data;

                if (storageMode === 'portable') {
                    if (type === 'inventory') setInventory(normalizedData);
                    if (type === 'recipes') setRecipes(normalizedData);
                    if (type === 'logs') setLogs(Array.isArray(normalizedData) ? normalizedData : []);
                    setUnsavedChanges(true);
                    setLastStorageMessage('Changes are saved for this session. Download a backup copy to keep them.');
                    return;
                }

                if (!dirHandle) return;
                try {
                    const filename = type === 'inventory' ? 'inventory.json' : type === 'recipes' ? 'recipes.json' : 'logs.json';
                    const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify(normalizedData, null, 2));
                    await writable.close();

                    if (type === 'inventory') setInventory(normalizedData);
                    if (type === 'recipes') setRecipes(normalizedData);
                    if (type === 'logs') setLogs(Array.isArray(normalizedData) ? normalizedData : []);
                    setUnsavedChanges(false);
                    setLastStorageMessage(`${filename} saved directly to your chosen folder.`);
                } catch (err) {
                    console.error(`Error saving ${type}`, err);
                    setError(`Failed to save ${type} to file system.`);
                }
            };

            const totalInventoryValue = inventory.reduce((sum, item) => sum + (item.totalPrice || 0), 0);

            if (isCheckingAccess) {
                return <div className="flex h-screen items-center justify-center bg-diner-bg text-diner-primary"><Icon name="loader2" className="animate-spin w-10 h-10" /></div>;
            }

            if (!storageMode) {
                return (
                    <div className="min-h-screen bg-diner-bg text-diner-text p-6 flex items-center justify-center">
                        <div className="w-full max-w-md text-center">
                            <img src="logo.png" alt="Hickory House Logo" className="w-44 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display = 'none'} />

                            <div className="bg-diner-surface border border-diner-border rounded-2xl p-8 shadow-xl space-y-5">
                                <div className="mx-auto w-20 h-20 rounded-2xl bg-orange-50 border border-orange-200 flex items-center justify-center text-diner-primary shadow-sm">
                                    <Icon name="folderOpen" className="w-11 h-11" />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold text-diner-text">Hickory House Inventory</h1>
                                </div>

                                <input
                                    ref={portableFileInputRef}
                                    type="file"
                                    multiple
                                    accept=".json,application/json"
                                    onChange={handlePortableFilesUpload}
                                    className="hidden"
                                />
                                <input
                                    ref={portableFolderInputRef}
                                    type="file"
                                    multiple
                                    accept=".json,application/json"
                                    onChange={handlePortableFilesUpload}
                                    className="hidden"
                                />

                                <button
                                    type="button"
                                    onClick={handleChooseFolder}
                                    className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3.5 px-6 rounded-xl w-full transition-colors flex items-center justify-center shadow-sm"
                                >
                                    <Icon name="folderOpen" className="w-5 h-5 mr-2" /> Start: Choose Inventory Folder
                                </button>

                                <button
                                    type="button"
                                    onClick={() => setIsGuideOpen(true)}
                                    className="border border-diner-border text-diner-text hover:bg-stone-50 font-bold py-3 px-6 rounded-xl w-full transition-colors flex items-center justify-center"
                                >
                                    <Icon name="helpCircle" className="w-5 h-5 mr-2" /> Open Simple Guide
                                </button>

                                <button
                                    type="button"
                                    onClick={toggleDarkMode}
                                    className="border border-diner-border text-diner-text hover:bg-stone-50 font-bold py-3 px-6 rounded-xl w-full transition-colors"
                                >
                                    {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                                </button>
                            </div>

                            {lastStorageMessage && <p className="text-center text-sm text-diner-muted font-medium mt-4">{lastStorageMessage}</p>}
                            {error && <p className="text-center text-diner-danger text-sm font-medium mt-4">{error}</p>}
                        </div>
                        {isGuideOpen && <GuideModal onClose={() => setIsGuideOpen(false)} />}
                    </div>
                );
            }

            const navItems = [
                { id: 'pantry', icon: 'folderOpen', label: 'Pantry' },
                { id: 'resupply', icon: 'clipboard', label: 'Add Many' },
                { id: 'kitchen', icon: 'calculator', label: 'Kitchen' }
            ];
            const currentNavItem = navItems.find(item => item.id === currentView) || navItems[0];

            const handleNavigate = (view) => {
                setCurrentView(view);
                setIsSidebarOpen(false);
            };

            const renderStorageControls = () => (
