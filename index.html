                    items.push({
                        id: 'import_' + Math.random().toString(36).substr(2, 9),
                        name: name,
                        originalSizeString: sizeStr,
                        totalPrice: safeTotalPrice,
                        purchasePrice: safeTotalPrice,
                        baseUnit: sizeData.baseUnit,
                        preferredUnit: sizeData.preferredUnit,
                        displayQuantity: toNumber(sizeData.displayQuantity, safeTotalBaseUnits / ((UNITS[sizeData.preferredUnit] || { toBase: 1 }).toBase || 1)),
                        displayUnit: sizeData.displayUnit || sizeData.preferredUnit,
                        totalBaseUnits: safeTotalBaseUnits,
                        costPerBaseUnit: calculateCostPerBaseUnit(safeTotalPrice, safeTotalBaseUnits)
                    });
                }
                setProcessedItems(items);
                setStep(3);
            };

            const updateProcessedItem = (id, field, value) => {
                setProcessedItems(prev => prev.map(item => {
                    if (item.id === id) {
                        const updatedItem = { ...item, [field]: value };
                        if (field === 'totalPrice') {
                            updatedItem.totalPrice = Math.max(0, toNumber(value, 0));
                            updatedItem.purchasePrice = updatedItem.totalPrice;
                        }
                        if (field === 'displayQuantity') {
                            const unitInfo = UNITS[updatedItem.displayUnit] || UNITS[updatedItem.preferredUnit] || UNITS.ea;
                            updatedItem.displayQuantity = Math.max(0, toNumber(value, 0));
                            updatedItem.totalBaseUnits = updatedItem.displayQuantity * unitInfo.toBase;
                            updatedItem.baseUnit = unitInfo.baseUnit;
                            updatedItem.preferredUnit = updatedItem.displayUnit || updatedItem.preferredUnit;
                        }
                        if (field === 'totalBaseUnits') {
                            updatedItem.totalBaseUnits = Math.max(0, toNumber(value, 0));
                        }
                        if (field === 'totalPrice' || field === 'displayQuantity' || field === 'totalBaseUnits') {
                            updatedItem.costPerBaseUnit = calculateCostPerBaseUnit(updatedItem.totalPrice, updatedItem.totalBaseUnits);
                        }
                        return updatedItem;
                    }
                    return item;
                }));
            };

            const removeProcessedItem = (id) => {
                setProcessedItems(prev => prev.filter(item => item.id !== id));
            };

            const confirmAndMerge = () => {
                const cleanItems = processedItems.map(i => normalizeInventoryItem({
                    ...i,
                    totalPrice: Math.max(0, toNumber(i.totalPrice, 0)),
                    purchasePrice: Math.max(0, toNumber(i.totalPrice, 0)),
                    preferredUnit: i.displayUnit || i.preferredUnit,
                    totalBaseUnits: Math.max(0, toNumber(i.totalBaseUnits, 0)),
                    originalSizeString: i.originalSizeString || `${toNumber(i.displayQuantity, 0)} ${i.displayUnit || i.preferredUnit || i.baseUnit}`
                }));
                const result = mergeNewItemsIntoInventory(inventory, cleanItems);

                if (result.conflicts.length > 0) {
                    alert('Some items could not be saved:\n\n' + result.conflicts.join('\n'));
                    return;
                }

                saveInventory(result.inventory);
                onFinish();
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animation-fadeIn">
                    <h2 className="text-3xl font-bold">Resupply</h2>
                    <p className="text-diner-muted">Import inventory lists by pasting a table or uploading spreadsheet, delimited text, JSON, HTML/XML table, or other supported table files. Review the detected columns before saving.</p>
                    {importStatus && <p className="text-sm font-bold text-diner-primary">{importStatus}</p>}

                    {step === 1 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden flex flex-col md:flex-row">
                            <div className="p-8 flex-1 border-b md:border-b-0 md:border-r border-diner-border flex flex-col justify-center items-center text-center">
                                <Icon name="clipboard" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Option 1: Paste from Excel/Word</h3>
                                <p className="text-sm text-diner-muted mb-6">Select your data table in Excel, copy it, and paste it directly into the text box.</p>
                                <textarea 
                                    value={rawText}
                                    onChange={(e) => setRawText(e.target.value)}
                                    placeholder="Paste table data here..."
                                    className="w-full h-48 bg-diner-bg border border-diner-border rounded-xl p-4 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-mono text-sm resize-none"
                                />
                                <button 
                                    onClick={() => processTextToRows(rawText, 'Pasted data')}
                                    disabled={!rawText.trim()}
                                    className="mt-4 bg-diner-primary disabled:opacity-50 hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Analyze Pasted Data
                                </button>
                            </div>
                            <div className="p-8 flex-1 flex flex-col justify-center items-center text-center bg-stone-50">
                                <div className="text-stone-400 mb-4 font-bold text-lg">OR</div>
                                <Icon name="upload" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Option 2: Upload File</h3>
                                <p className="text-sm text-diner-muted mb-6">Upload XLSX, XLS, ODS, CSV, TSV, pipe/semicolon text, JSON, HTML/XML tables, or similar inventory exports.</p>
                                <input 
                                    type="file" 
                                    ref={fileInputRef} 
                                    onChange={handleFileUpload} 
                                    accept={SUPPORTED_RESUPPLY_ACCEPT} 
                                    multiple
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Browse Files
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex flex-col md:flex-row md:justify-between md:items-center gap-4 bg-stone-50">
                                <div>
                                    <h3 className="text-xl font-bold">Map Columns</h3>
                                    <p className="text-sm text-diner-muted">Confirm what data is in each column. Auto-detection is applied first. (Showing first 5 rows)</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                                    <button
                                        type="button"
                                        onClick={toggleHideIgnoredColumns}
                                        className={`${hideIgnoredColumns ? 'bg-diner-primary text-white hover:bg-diner-hover' : 'bg-white text-diner-text hover:bg-stone-50 border border-diner-border'} font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm`}
                                        title="Hide or show columns currently marked Ignore Column. This preference is remembered on this device."
                                    >
                                        {hideIgnoredColumns ? 'Show Ignored Columns' : 'Hide Ignored Columns'}
                                    </button>
                                    <button 
                                        onClick={processMappedData}
                                        className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center shadow-sm"
                                    >
                                        Continue <Icon name="arrowRight" className="w-4 h-4 ml-2" />
                                    </button>
                                </div>
                            </div>
                            <div className="resupply-map-scroll">
                                <table className="resupply-map-table text-left text-sm whitespace-nowrap">
                                    <thead className="bg-diner-surface border-b border-diner-border text-diner-text">
                                        <tr>
                                            {getVisibleImportColumnIndexes().map((colIndex) => (
                                                <th key={colIndex} className="p-3 font-semibold align-top">
                                                    <select 
                                                        value={columnMap[colIndex] || 'ignore'} 
                                                        onChange={(e) => handleMapChange(colIndex, e.target.value)}
                                                        title="Choose what this imported column represents"
                                                        className="resupply-map-select bg-white border border-stone-300 rounded p-2 text-stone-800 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium"
                                                    >
                                                        <option value="ignore">Ignore Column</option>
                                                        <option value="name">Item Name</option>
                                                        <option value="size">Pack Size (e.g. 6/1.5 LB)</option>
                                                        <option value="price">Total Price</option>
                                                    </select>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100 text-diner-muted">
                                        {parsedRows.slice(0, 5).map((row, rowIndex) => (
                                            <tr key={rowIndex} className="hover:bg-stone-50">
                                                {getVisibleImportColumnIndexes().map((colIndex) => {
                                                    const cell = row[colIndex] || '';
                                                    return <td key={colIndex} title={cell} className="p-3 resupply-map-cell border-r border-stone-100">{cell}</td>;
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex justify-between items-center bg-orange-50/50">
                                <div>
                                    <h3 className="text-xl font-bold text-diner-primary">Review & Correct Data</h3>
                                    <p className="text-sm text-diner-muted">Verify the automatic conversions. Quantities stay in the uploaded unit here, while base units are saved in the background.</p>
                                </div>
                                <button 
                                    onClick={confirmAndMerge}
                                    className="bg-diner-primary hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center shadow-sm"
                                >
                                    <Icon name="save" className="w-4 h-4 mr-2" /> Save to Pantry
                                </button>
                            </div>
                            <div className="overflow-x-auto max-h-[60vh] overflow-y-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-stone-50 text-diner-text sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="p-4 font-semibold">Item Name</th>
                                            <th className="p-4 font-semibold">Original Pack</th>
                                            <th className="p-4 font-semibold w-32">Total Price ($)</th>
                                            <th className="p-4 font-semibold w-56">Imported Quantity</th>
                                            <th className="p-4 font-semibold">Final Cost / Unit</th>
                                            <th className="p-4 font-semibold text-center">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100">
                                        {processedItems.map((item) => (
                                            <tr key={item.id} className="hover:bg-stone-50 transition-colors">
                                                <td className="p-4 font-medium text-diner-text">{item.name}</td>
                                                <td className="p-4 text-diner-muted">{item.originalSizeString}</td>
                                                <td className="p-4">
                                                    <input 
                                                        type="number" step="0.01" 
                                                        value={item.totalPrice} 
                                                        onChange={(e) => updateProcessedItem(item.id, 'totalPrice', e.target.value)}
                                                        className="w-full bg-white border border-stone-300 rounded p-2 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-bold text-diner-accent"
                                                    />
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex items-center space-x-2">
                                                        <input 
                                                            type="number" step="any" 
                                                            value={item.displayQuantity ?? ''} 
                                                            onChange={(e) => updateProcessedItem(item.id, 'displayQuantity', e.target.value)}
                                                            className="w-28 bg-white border border-stone-300 rounded p-2 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary text-diner-text font-medium"
                                                        />
                                                        <span className="text-diner-muted font-medium">{(UNITS[item.displayUnit] || UNITS[item.preferredUnit] || { label: item.displayUnit || item.preferredUnit || item.baseUnit }).label || item.displayUnit || item.preferredUnit || item.baseUnit}</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-diner-muted font-medium">
                                                    {formatCurrency(toNumber(item.totalPrice, 0) / Math.max(toNumber(item.displayQuantity, 0), 1))} / {item.displayUnit || item.preferredUnit || item.baseUnit}
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => removeProcessedItem(item.id)} className="text-stone-400 hover:text-diner-danger p-2 transition-colors"><Icon name="trash2" className="w-4 h-4"/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Pantry({ inventory, saveInventory }) {
            const [searchTerm, setSearchTerm] = useState("");
            const [isEditing, setIsEditing] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [selectedIds, setSelectedIds] = useState([]);
            const [showExpiringOnly, setShowExpiringOnly] = useState(false);

            useEffect(() => {
                setSelectedIds(prev => prev.filter(id => inventory.some(item => item.id === id)));
            }, [inventory]);

            const normalizedInventory = inventory.map(normalizeInventoryItem);
            const filteredInventory = normalizedInventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesExpirationFilter = !showExpiringOnly || isExpiredOrNearExpired(item);
                return matchesSearch && matchesExpirationFilter;
            });
            const visibleIds = filteredInventory.map(item => item.id);
            const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selectedIds.includes(id));
            const expiringCount = normalizedInventory.filter(isExpiredOrNearExpired).length;

            const toggleSelect = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(existingId => existingId !== id) : [...prev, id]);
            };

            const toggleSelectVisible = () => {
                if (allVisibleSelected) {
                    const visibleSet = new Set(visibleIds);
                    setSelectedIds(prev => prev.filter(id => !visibleSet.has(id)));
                } else {
                    setSelectedIds(prev => Array.from(new Set([...prev, ...visibleIds])));
                }
            };

            const handleSave = (item) => {
                const newItem = normalizeInventoryItem({
                    ...item,
                    id: item.id || Date.now().toString()
                });
                const result = mergeNewItemsIntoInventory(
                    inventory,
                    [newItem],
                    { excludeIds: editItem?.id ? [editItem.id] : [] }
                );

                if (result.conflicts.length > 0) {
                    alert(result.conflicts.join('\n'));
                    return;
                }

                saveInventory(result.inventory);
                setIsEditing(false);
                setEditItem(null);
            };

            const handleDelete = (id) => {
                if(confirm("Are you sure you want to delete this item?")) {
                    saveInventory(inventory.filter(i => i.id !== id));
                    setSelectedIds(prev => prev.filter(selectedId => selectedId !== id));
                }
            };

            const handleDeleteSelected = () => {
                if (selectedIds.length === 0) return;
                if(confirm(`Delete ${selectedIds.length} selected pantry item${selectedIds.length === 1 ? '' : 's'}?`)) {
                    const selectedSet = new Set(selectedIds);
                    saveInventory(inventory.filter(i => !selectedSet.has(i.id)));
                    setSelectedIds([]);
                }
            };

            const ExpirationBadge = ({ item }) => {
                const status = getExpirationStatus(item);
                if (status.state === 'expired') {
                    return <span className="inline-flex rounded-full bg-red-100 text-diner-danger border border-red-200 px-2.5 py-1 text-xs font-bold">{status.label}</span>;
                }
                if (status.state === 'warning') {
                    return <span className="inline-flex rounded-full bg-orange-50 text-diner-primary border border-orange-200 px-2.5 py-1 text-xs font-bold">{status.label}</span>;
                }
                if (status.state === 'ok') {
                    return <span className="inline-flex rounded-full bg-stone-50 text-diner-muted border border-diner-border px-2.5 py-1 text-xs font-medium">{item.expirationDate}</span>;
                }
                if (status.state === 'unknown') {
                    return <span className="inline-flex rounded-full bg-stone-50 text-diner-muted border border-diner-border px-2.5 py-1 text-xs font-medium">{status.label}</span>;
                }
                return <span className="text-stone-400 text-xs font-medium">No date</span>;
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animation-fadeIn">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                        <div>
                            <h2 className="text-3xl font-bold">Pantry</h2>
                            <p className="text-diner-muted text-sm mt-1">{expiringCount} item{expiringCount === 1 ? '' : 's'} expired or expiring within {EXPIRATION_WARNING_DAYS} days.</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button 
                                onClick={() => setShowExpiringOnly(prev => !prev)}
                                className={`${showExpiringOnly ? 'bg-diner-primary text-white' : 'bg-white text-diner-text border border-diner-border hover:bg-stone-50'} px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm`}
                            >
                                {showExpiringOnly ? 'Show All Items' : 'Show Expiring Items'}
                            </button>
                            <button 
                                onClick={toggleSelectVisible}
                                disabled={visibleIds.length === 0}
                                className="bg-white disabled:opacity-50 border border-diner-border hover:bg-stone-50 text-diner-text px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm"
                            >
                                {allVisibleSelected ? 'Clear Visible' : 'Select All Visible'}
                            </button>
                            <button 
                                onClick={handleDeleteSelected}
                                disabled={selectedIds.length === 0}
                                className="bg-red-50 disabled:opacity-50 text-diner-danger hover:bg-red-100 border border-red-200 px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm"
                            >
                                Delete Selected ({selectedIds.length})
                            </button>
                            <button 
                                onClick={() => { setEditItem(null); setIsEditing(true); }}
                                className="bg-diner-primary hover:bg-diner-hover text-white px-5 py-2.5 rounded-lg font-bold flex items-center transition-colors shadow-sm"
                            >
                                <Icon name="plus" className="w-4 h-4 mr-2" /> Add Item
                            </button>
                        </div>
                    </div>

                    <div className="bg-diner-surface border border-diner-border rounded-2xl overflow-hidden shadow-sm">
                        <div className="p-4 border-b border-diner-border flex items-center bg-stone-50">
                            <Icon name="search" className="w-5 h-5 text-stone-400 mr-3" />
                            <input 
                                type="text" 
                                placeholder="Search pantry items..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="bg-transparent border-none outline-none text-diner-text w-full placeholder-stone-400 font-medium"
                            />
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-white border-b border-diner-border text-diner-text">
                                    <tr>
                                        <th className="p-4 font-semibold w-12">
                                            <input type="checkbox" checked={allVisibleSelected} onChange={toggleSelectVisible} disabled={visibleIds.length === 0} />
                                        </th>
                                        <th className="p-4 font-semibold">Item Name</th>
                                        <th className="p-4 font-semibold text-right">Total Price</th>
                                        <th className="p-4 font-semibold text-right">Available Amount</th>
                                        <th className="p-4 font-semibold text-right">Cost Per Base Unit</th>
                                        <th className="p-4 font-semibold">Expiration</th>
                                        <th className="p-4 font-semibold text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-stone-100">
                                    {filteredInventory.length === 0 ? (
                                        <tr><td colSpan="7" className="p-8 text-center text-diner-muted font-medium">No items found.</td></tr>
                                    ) : filteredInventory.map(item => (
                                        <tr key={item.id} className={`${selectedIds.includes(item.id) ? 'bg-orange-50/50' : 'hover:bg-stone-50'} transition-colors`}>
                                            <td className="p-4">
                                                <input type="checkbox" checked={selectedIds.includes(item.id)} onChange={() => toggleSelect(item.id)} />
                                            </td>
                                            <td className="p-4 font-semibold text-diner-text">{item.name}</td>
                                            <td className="p-4 text-right text-diner-accent font-bold">{formatCurrency(item.totalPrice)}</td>
                                            <td className="p-4 text-right font-semibold text-diner-text">{formatUnitDisplay(item.totalBaseUnits, item.baseUnit)}</td>
                                            <td className="p-4 text-right text-diner-muted font-medium">{formatCurrency(item.costPerBaseUnit)} / {item.baseUnit}</td>
                                            <td className="p-4"><ExpirationBadge item={item} /></td>
                                            <td className="p-4">
                                                <div className="flex items-center justify-center space-x-3">
                                                    <button onClick={() => { setEditItem(item); setIsEditing(true); }} className="text-stone-400 hover:text-diner-primary transition-colors"><Icon name="edit2" className="w-4 h-4"/></button>
                                                    <button onClick={() => handleDelete(item.id)} className="text-stone-400 hover:text-diner-danger transition-colors"><Icon name="trash2" className="w-4 h-4"/></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isEditing && (
                        <ItemModal 
                            item={editItem} 
                            onClose={() => setIsEditing(false)} 
                            onSave={handleSave} 
                        />
                    )}
                </div>
            );
        }

        function ItemModal({ item, onClose, onSave }) {
            const startingUnit = item ? getItemPreferredUnit(item, false) : "g";
            const startingUnitInfo = UNITS[startingUnit] || UNITS.g;
            const startingQty = item ? toNumber(item.totalBaseUnits, 0) / startingUnitInfo.toBase : "";

            const [name, setName] = useState(item ? item.name : "");
            const [totalPrice, setTotalPrice] = useState(item ? item.totalPrice : "");
            const [inputQty, setInputQty] = useState(startingQty);
            const [inputUnit, setInputUnit] = useState(startingUnit);
            const [expirationDate, setExpirationDate] = useState(item ? (item.expirationDate || "") : "");

            const handleSave = (e) => {
                e.preventDefault();
                const unitTypeObj = UNITS[inputUnit];
                const qty = toNumber(inputQty, NaN);
                const price = toNumber(totalPrice, NaN);

                if (!name.trim() || !unitTypeObj || !Number.isFinite(qty) || qty <= 0 || !Number.isFinite(price) || price < 0) {
                    alert('Please enter a valid name, price, quantity, and unit before saving.');
                    return;
                }

                const baseUnitStr = unitTypeObj.baseUnit;
                const totalBaseUnits = qty * unitTypeObj.toBase;

                onSave({
                    id: item ? item.id : null,
                    name: name.trim(),
                    totalPrice: price,
                    purchasePrice: price,
                    originalSizeString: `${qty} ${inputUnit}`,
                    totalBaseUnits: totalBaseUnits,
                    baseUnit: baseUnitStr,
                    preferredUnit: inputUnit,
                    expirationDate: expirationDate.trim()
                });
            };

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-diner-surface border border-diner-border rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animation-fadeIn">
                        <div className="flex justify-between items-center p-6 border-b border-diner-border bg-stone-50">
                            <h3 className="text-xl font-bold text-diner-text">{item ? 'Edit Item' : 'Add Item'}</h3>
                            <button onClick={onClose} className="text-stone-400 hover:text-diner-danger transition-colors"><Icon name="x" className="w-5 h-5"/></button>
                        </div>
                        <form onSubmit={handleSave} className="p-6 space-y-5">
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-1">Item Name</label>
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="e.g. Granny Smith Apples" />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-1">Total Price ($)</label>
                                <input required type="number" step="0.01" min="0" value={totalPrice} onChange={e=>setTotalPrice(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="e.g. 25.50" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-diner-text mb-1">Quantity</label>
                                    <input required type="number" step="any" min="0" value={inputQty} onChange={e=>setInputQty(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="e.g. 15" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-diner-text mb-1">Unit</label>
                                    <select value={inputUnit} onChange={e=>setInputUnit(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium transition-shadow">
                                        {Object.entries(UNITS)
                                            .filter(([key]) => key !== 'dzn')
                                            .map(([key, val]) => (
                                            <option key={key} value={key}>{val.label}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-1">Expiration Date / Note <span className="text-diner-muted font-normal">(optional)</span></label>
                                <input type="text" value={expirationDate} onChange={e=>setExpirationDate(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="e.g. 2026-06-01, June 1, 2026, or use-by note" />
                                <p className="text-xs text-diner-muted mt-1">Date-like values will be marked when expired or within {EXPIRATION_WARNING_DAYS} days.</p>
                            </div>
                            <div className="pt-4">
                                <button type="submit" className="w-full bg-diner-primary hover:bg-diner-hover text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm">
                                    Save Item
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function Kitchen({ inventory, recipes, logs, saveRecipes, saveInventory, saveLogs }) {
            const [isCreating, setIsCreating] = useState(false);
            const [editingRecipeId, setEditingRecipeId] = useState(null);
            
            const [recipeName, setRecipeName] = useState("");
            const [recipeTags, setRecipeTags] = useState("");
            const [ingredients, setIngredients] = useState([]); 
            
            const [selectedItemId, setSelectedItemId] = useState("");
            const [ingredientQty, setIngredientQty] = useState("");
            const [ingredientUnit, setIngredientUnit] = useState("g");
            const [dishSearch, setDishSearch] = useState("");
            const [activeTag, setActiveTag] = useState("");
            const [selectedRecipeIds, setSelectedRecipeIds] = useState([]);
            const [collapsedRecipeIds, setCollapsedRecipeIds] = useState([]);

            useEffect(() => {
                setSelectedRecipeIds(prev => prev.filter(id => recipes.some(recipe => recipe.id === id)));
                setCollapsedRecipeIds(prev => prev.filter(id => recipes.some(recipe => recipe.id === id)));
            }, [recipes]);

            const selectedItem = inventory.find(i => i.id === selectedItemId);
            const ingredientUnitOptions = getKitchenUnitEntriesForItem();
            const normalizedRecipes = recipes.map(normalizeRecipe);
            const allTags = Array.from(new Set(normalizedRecipes.flatMap(recipe => recipe.tags))).sort((a, b) => a.localeCompare(b));
            const filteredRecipes = normalizedRecipes.filter(recipe => {
                const query = dishSearch.trim().toLowerCase();
                const haystack = [
                    recipe.name,
                    recipe.tags.join(' '),
                    recipe.ingredients.map(ing => ing.name).join(' ')
                ].join(' ').toLowerCase();
                const matchesSearch = !query || haystack.includes(query);
                const matchesTag = !activeTag || recipe.tags.includes(activeTag);
                return matchesSearch && matchesTag;
            });
            const visibleRecipeIds = filteredRecipes.map(recipe => recipe.id);
            const allVisibleRecipesSelected = visibleRecipeIds.length > 0 && visibleRecipeIds.every(id => selectedRecipeIds.includes(id));

            const resetRecipeForm = () => {
                setRecipeName("");
                setRecipeTags("");
                setIngredients([]);
                setSelectedItemId("");
                setIngredientQty("");
                setIngredientUnit("g");
            };

            const handleSelectedItemChange = (e) => {
                const nextItemId = e.target.value;
                const nextItem = inventory.find(i => i.id === nextItemId);
                setSelectedItemId(nextItemId);
                setIngredientUnit(getKitchenDefaultUnitForItem(nextItem));
            };

            const getRecipeCurrentCost = (recipe) => {
                return recipe.ingredients.reduce((sum, ing) => {
                    const item = inventory.find(i => i.id === ing.inventoryId);
                    if (!item) return sum + toNumber(ing.cost, 0);
                    const normalizedItem = normalizeInventoryItem(item);
                    return sum + (toNumber(ing.baseQty, 0) * normalizedItem.costPerBaseUnit);
                }, 0);
            };

            const handleAddIngredient = (e) => {
                e.preventDefault();
                const item = inventory.find(i => i.id === selectedItemId);
                if (!item) return;

                const normalizedItem = normalizeInventoryItem(item);
                const unitInfo = UNITS[ingredientUnit];
                const qty = toNumber(ingredientQty, NaN);

                if (!unitInfo) {
                    alert('Please choose a valid measurement unit.');
                    return;
                }

                if (!Number.isFinite(qty) || qty <= 0) {
                    alert('Please enter an ingredient quantity greater than 0.');
                    return;
                }

                const conversion = convertIngredientForItem(qty, ingredientUnit, normalizedItem);

                const newIngredient = {
                    id: Date.now().toString(),
                    inventoryId: normalizedItem.id,
                    name: normalizedItem.name,
                    inputQty: qty,
                    inputUnit: ingredientUnit,
                    baseQty: conversion.baseQty,
                    baseUnitType: conversion.baseUnitType,
                    cost: conversion.cost,
                    isEstimated: conversion.isEstimated,
                    conversionNote: conversion.conversionNote
                };

                setIngredients([...ingredients, newIngredient]);
                setIngredientQty("");
                setSelectedItemId("");
                setIngredientUnit("g");
            };

            const handleSaveRecipe = () => {
                if(!recipeName.trim()) return;
                const recalculatedIngredients = ingredients.map(ing => {
                    const item = inventory.find(i => i.id === ing.inventoryId);
                    if (!item) return { ...ing, cost: toNumber(ing.cost, 0) };
                    const normalizedItem = normalizeInventoryItem(item);
                    const conversion = convertIngredientForItem(ing.inputQty, ing.inputUnit, normalizedItem);
                    return {
                        ...ing,
                        baseQty: conversion.baseQty,
                        baseUnitType: conversion.baseUnitType,
                        cost: conversion.cost,
                        isEstimated: conversion.isEstimated,
                        conversionNote: conversion.conversionNote
                    };
                });
                const totalCost = recalculatedIngredients.reduce((sum, ing) => sum + toNumber(ing.cost, 0), 0);
                
                const newRecipe = normalizeRecipe({
                    id: editingRecipeId || Date.now().toString(),
                    name: recipeName.trim(),
                    tags: normalizeTags(recipeTags),
                    ingredients: recalculatedIngredients,
                    totalCost: totalCost
                });

                if (editingRecipeId) {
                    saveRecipes(recipes.map(r => r.id === editingRecipeId ? newRecipe : r));
                } else {
                    saveRecipes([...recipes, newRecipe]);
                }

                setIsCreating(false);
                setEditingRecipeId(null);
                resetRecipeForm();
            };

            const handleEditRecipe = (recipe) => {
                const normalizedRecipe = normalizeRecipe(recipe);
                setRecipeName(normalizedRecipe.name);
                setRecipeTags(normalizedRecipe.tags.join(', '));
                setIngredients(normalizedRecipe.ingredients);
                setEditingRecipeId(normalizedRecipe.id);
                setSelectedItemId("");
                setIngredientQty("");
                setIngredientUnit("g");
                setIsCreating(true);
            };

            const handleDeleteRecipe = (id) => {
                if(confirm("Delete this dish?")) {
                    saveRecipes(recipes.filter(r => r.id !== id));
                    setSelectedRecipeIds(prev => prev.filter(recipeId => recipeId !== id));
                }
            };

            const toggleRecipeSelected = (id) => {
                setSelectedRecipeIds(prev => prev.includes(id) ? prev.filter(recipeId => recipeId !== id) : [...prev, id]);
            };

            const toggleSelectVisibleRecipes = () => {
                if (allVisibleRecipesSelected) {
                    const visibleSet = new Set(visibleRecipeIds);
                    setSelectedRecipeIds(prev => prev.filter(id => !visibleSet.has(id)));
                } else {
                    setSelectedRecipeIds(prev => Array.from(new Set([...prev, ...visibleRecipeIds])));
                }
            };

            const handleDeleteSelectedRecipes = () => {
                if (selectedRecipeIds.length === 0) return;
                if (confirm(`Delete ${selectedRecipeIds.length} selected dish${selectedRecipeIds.length === 1 ? '' : 'es'}?`)) {
                    const selectedSet = new Set(selectedRecipeIds);
                    saveRecipes(recipes.filter(recipe => !selectedSet.has(recipe.id)));
                    setSelectedRecipeIds([]);
                }
            };

            const toggleRecipeCollapsed = (id) => {
                setCollapsedRecipeIds(prev => prev.includes(id) ? prev.filter(recipeId => recipeId !== id) : [...prev, id]);
            };

            const collapseAllVisibleRecipes = () => {
                setCollapsedRecipeIds(prev => Array.from(new Set([...prev, ...visibleRecipeIds])));
            };

            const expandAllVisibleRecipes = () => {
                const visibleSet = new Set(visibleRecipeIds);
                setCollapsedRecipeIds(prev => prev.filter(id => !visibleSet.has(id)));
            };

            const handleCookDish = (recipe) => {
                if(!confirm(`Cook "${recipe.name}"? This will automatically deduct the ingredients from your pantry and record to the Ledger.`)) return;
                
                let updatedInventory = inventory.map(normalizeInventoryItem);
                let missingItems = [];
                
                for(let ing of recipe.ingredients) {
                    const invItemIndex = updatedInventory.findIndex(i => i.id === ing.inventoryId);
                    if(invItemIndex === -1) {
                        missingItems.push(`- ${ing.name} (Item deleted from pantry)`);
                        continue;
                    }
                    const conversion = convertIngredientForItem(ing.inputQty, ing.inputUnit, updatedInventory[invItemIndex]);
                    const requiredBaseQty = conversion.baseQty || toNumber(ing.baseQty, 0);
                    if(updatedInventory[invItemIndex].totalBaseUnits < (requiredBaseQty - 0.01)) { 
                        missingItems.push(`- ${ing.name} (Have ${formatUnitDisplay(updatedInventory[invItemIndex].totalBaseUnits, updatedInventory[invItemIndex].baseUnit)}, Need ${formatUnitDisplay(requiredBaseQty, updatedInventory[invItemIndex].baseUnit)})`);
                    }
                }
                
                if(missingItems.length > 0) {
                    alert("Cannot cook dish. Missing or insufficient ingredients:\n\n" + missingItems.join("\n"));
                    return;
                }

                let actualTotalCost = 0;
                const actualIngredients = [];
                
                for(let ing of recipe.ingredients) {
                    const invItemIndex = updatedInventory.findIndex(i => i.id === ing.inventoryId);
                    let item = { ...updatedInventory[invItemIndex] };
                    const conversion = convertIngredientForItem(ing.inputQty, ing.inputUnit, item);
                    const baseQty = conversion.baseQty || toNumber(ing.baseQty, 0);
                    const ingredientCost = baseQty * item.costPerBaseUnit;
                    actualTotalCost += ingredientCost;
                    actualIngredients.push({
                        name: ing.name,
                        qty: ing.inputQty,
                        unit: ing.inputUnit,
                        cost: ingredientCost,
                        isEstimated: conversion.isEstimated,
                        conversionNote: conversion.conversionNote
                    });
                    
                    item.totalBaseUnits = Math.max(0, item.totalBaseUnits - baseQty);
                    item.totalPrice = item.totalBaseUnits * item.costPerBaseUnit;
                    updatedInventory[invItemIndex] = normalizeInventoryItem(item);
                }
                
                const logEntry = {
                    id: Date.now().toString(),
                    date: new Date().toISOString(),
                    recipeName: recipe.name,
                    totalCost: actualTotalCost,
                    ingredients: actualIngredients
                };

                saveInventory(updatedInventory);
                saveLogs([...logs, logEntry]);

                alert(`Successfully cooked ${recipe.name}! Pantry and Ledger have been updated.`);
            };

            const handleCloseCreate = () => {
                setIsCreating(false);
                setEditingRecipeId(null);
                resetRecipeForm();
            };

            const startNewRecipe = () => {
                setEditingRecipeId(null);
                resetRecipeForm();
                setIsCreating(true);
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animation-fadeIn">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                        <div>
                            <h2 className="text-3xl font-bold">Kitchen</h2>
                            <p className="text-diner-muted text-sm mt-1">Create, tag, search, collapse, cook, or bulk-delete saved dishes.</p>
                        </div>
                        {!isCreating && (
                            <button 
                                onClick={startNewRecipe}
                                className="bg-stone-800 hover:bg-stone-700 text-white px-5 py-2.5 rounded-lg font-bold flex items-center transition-colors shadow-sm"
                            >
                                <Icon name="plus" className="w-4 h-4 mr-2" /> Create New Dish
                            </button>
                        )}
                    </div>

                    {isCreating ? (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl p-8 shadow-sm space-y-8 animation-fadeIn">
                            <div className="flex flex-col lg:flex-row lg:justify-between gap-4 mb-2 border-b border-stone-200 pb-4">
                                <div className="flex-1 space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Dish Name</label>
                                        <input 
                                            type="text" 
                                            placeholder="e.g. Buttermilk Pancakes" 
                                            value={recipeName}
                                            onChange={e=>setRecipeName(e.target.value)}
                                            className="bg-transparent text-3xl font-bold text-diner-text outline-none w-full placeholder-stone-300"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Dish Tags <span className="text-diner-muted font-normal">(optional)</span></label>
                                        <input
                                            type="text"
                                            placeholder="breakfast, smoked, special"
                                            value={recipeTags}
                                            onChange={e=>setRecipeTags(e.target.value)}
                                            className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary shadow-sm font-medium"
                                        />
                                        <p className="text-xs text-diner-muted mt-1">Tags are saved separately from the dish name and can be searched or filtered later.</p>
                                    </div>
                                </div>
                                <button onClick={handleCloseCreate} className="self-start text-stone-400 hover:text-diner-danger transition-colors bg-stone-100 hover:bg-red-50 p-2 rounded-full"><Icon name="x" className="w-5 h-5"/></button>
                            </div>

                            <div className="bg-stone-50 p-6 rounded-xl border border-diner-border shadow-inner">
                                <h4 className="text-sm font-bold text-diner-text mb-4 uppercase tracking-wider">Add Ingredient from Pantry</h4>
                                <form onSubmit={handleAddIngredient} className="flex flex-col md:flex-row gap-4 items-end">
                                    <div className="flex-1">
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Item</label>
                                        <select required value={selectedItemId} onChange={handleSelectedItemChange} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary shadow-sm font-medium">
                                            <option value="" disabled>Select Item...</option>
                                            {inventory.map(item => {
                                                const normalizedItem = normalizeInventoryItem(item);
                                                return (
                                                    <option key={normalizedItem.id} value={normalizedItem.id}>{normalizedItem.name} ({formatCurrency(normalizedItem.costPerBaseUnit)}/{normalizedItem.baseUnit})</option>
                                                );
                                            })}
                                        </select>
                                    </div>
                                    <div className="w-32">
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Used Qty</label>
                                        <input required type="number" step="any" min="0" value={ingredientQty} onChange={e=>setIngredientQty(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary shadow-sm font-medium" placeholder="0" />
                                    </div>
                                    <div className="w-40">
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Measurement Unit</label>
                                        <select value={ingredientUnit} onChange={e=>setIngredientUnit(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary shadow-sm font-medium">
                                            {ingredientUnitOptions.map(([key, val]) => (
                                                <option key={key} value={key}>{val.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <button type="submit" className="bg-stone-800 hover:bg-stone-700 text-white font-bold px-6 py-3 rounded-lg shadow-sm transition-colors">
                                        Add
                                    </button>
                                </form>
                            </div>

                            <div className="border border-diner-border rounded-xl overflow-hidden shadow-sm">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-stone-50 text-diner-text border-b border-diner-border">
                                        <tr>
                                            <th className="p-4 font-semibold">Ingredient</th>
                                            <th className="p-4 font-semibold">Amount Used</th>
                                            <th className="p-4 font-semibold">Base Conversion</th>
                                            <th className="p-4 font-semibold text-right">Calculated Cost</th>
                                            <th className="p-4 font-semibold text-center"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100 bg-white">
                                        {ingredients.length === 0 ? (
                                            <tr><td colSpan="5" className="p-8 text-center text-diner-muted font-medium">No ingredients added yet.</td></tr>
                                        ) : ingredients.map((ing) => (
                                            <tr key={ing.id} className="hover:bg-stone-50 transition-colors">
                                                <td className="p-4 font-bold text-diner-text">{ing.name}</td>
                                                <td className="p-4 text-diner-text font-medium">{ing.inputQty} {UNITS[ing.inputUnit]?.label || ing.inputUnit}</td>
                                                <td className="p-4 text-stone-400 text-xs font-medium">
                                                    <div>≈ {formatUnitDisplay(ing.baseQty, ing.baseUnitType)}</div>
                                                    {ing.isEstimated && <div className="mt-1 text-diner-primary font-semibold">Estimate: {ing.conversionNote}</div>}
                                                </td>
                                                <td className="p-4 text-right font-bold text-diner-accent">{formatCurrency(ing.cost)}</td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => setIngredients(ingredients.filter(i=>i.id !== ing.id))} className="text-stone-400 hover:text-diner-danger transition-colors p-1"><Icon name="x" className="w-4 h-4 mx-auto"/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    {ingredients.length > 0 && (
                                        <tfoot className="bg-stone-50 border-t border-diner-border">
                                            <tr>
                                                <td colSpan="3" className="p-5 text-right font-bold text-diner-text uppercase tracking-wider text-xs">Total Dish Cost:</td>
                                                <td className="p-5 text-right font-bold text-2xl text-diner-accent">{formatCurrency(ingredients.reduce((s, i) => s + i.cost, 0))}</td>
                                                <td></td>
                                            </tr>
                                        </tfoot>
                                    )}
                                </table>
                            </div>

                            <div className="flex justify-end pt-2">
                                <button 
                                    onClick={handleSaveRecipe}
                                    disabled={!recipeName.trim()}
                                    className="bg-diner-primary disabled:opacity-50 disabled:cursor-not-allowed hover:bg-diner-hover text-white font-bold py-3.5 px-8 rounded-xl transition-colors shadow-sm"
                                >
                                    {editingRecipeId ? 'Update Dish' : 'Save Dish'}
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-5">
                            <div className="bg-diner-surface border border-diner-border rounded-2xl p-4 shadow-sm space-y-4">
                                <div className="grid grid-cols-1 lg:grid-cols-[1fr_220px] gap-3">
                                    <div className="flex items-center bg-stone-50 border border-diner-border rounded-xl px-3">
                                        <Icon name="search" className="w-5 h-5 text-stone-400 mr-3" />
                                        <input
                                            type="text"
                                            value={dishSearch}
                                            onChange={e=>setDishSearch(e.target.value)}
                                            placeholder="Search dishes, tags, or ingredients..."
                                            className="bg-transparent border-none outline-none text-diner-text w-full placeholder-stone-400 font-medium py-3"
                                        />
                                    </div>
                                    <select value={activeTag} onChange={e=>setActiveTag(e.target.value)} className="w-full bg-white border border-stone-300 rounded-xl p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium">
                                        <option value="">All Tags</option>
                                        {allTags.map(tag => <option key={tag} value={tag}>{tag}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-wrap gap-2 items-center justify-between">
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={toggleSelectVisibleRecipes} disabled={visibleRecipeIds.length === 0} className="bg-white disabled:opacity-50 border border-diner-border hover:bg-stone-50 text-diner-text px-4 py-2 rounded-lg font-bold transition-colors">
                                            {allVisibleRecipesSelected ? 'Clear Visible' : 'Select All Visible'}
                                        </button>
                                        <button onClick={handleDeleteSelectedRecipes} disabled={selectedRecipeIds.length === 0} className="bg-red-50 disabled:opacity-50 text-diner-danger hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-bold transition-colors">
                                            Delete Selected ({selectedRecipeIds.length})
                                        </button>
                                        <button onClick={collapseAllVisibleRecipes} disabled={visibleRecipeIds.length === 0} className="bg-white disabled:opacity-50 border border-diner-border hover:bg-stone-50 text-diner-text px-4 py-2 rounded-lg font-bold transition-colors">
                                            Collapse Visible
                                        </button>
                                        <button onClick={expandAllVisibleRecipes} disabled={visibleRecipeIds.length === 0} className="bg-white disabled:opacity-50 border border-diner-border hover:bg-stone-50 text-diner-text px-4 py-2 rounded-lg font-bold transition-colors">
                                            Expand Visible
                                        </button>
                                    </div>
                                    <div className="text-sm text-diner-muted font-medium">Showing {filteredRecipes.length} of {recipes.length} dishes</div>
                                </div>
                                {allTags.length > 0 && (
                                    <div className="flex flex-wrap gap-2 pt-1">
                                        {allTags.map(tag => (
                                            <button key={tag} onClick={() => setActiveTag(activeTag === tag ? '' : tag)} className={`${activeTag === tag ? 'bg-diner-primary text-white' : 'bg-stone-50 text-diner-muted border border-diner-border'} rounded-full px-3 py-1 text-xs font-bold transition-colors`}>
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {recipes.length === 0 ? (
                                <div className="py-16 text-center border-2 border-dashed border-stone-300 bg-stone-50/50 rounded-3xl text-diner-muted font-medium">
                                    No dishes created yet. Click "Create New Dish" to calculate costs.
                                </div>
                            ) : filteredRecipes.length === 0 ? (
                                <div className="py-16 text-center border-2 border-dashed border-stone-300 bg-stone-50/50 rounded-3xl text-diner-muted font-medium">
                                    No dishes match the current search or tag filter.
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredRecipes.map(recipe => {
                                        const isCollapsed = collapsedRecipeIds.includes(recipe.id);
                                        const isSelected = selectedRecipeIds.includes(recipe.id);
                                        return (
                                            <div key={recipe.id} className={`${isSelected ? 'ring-2 ring-diner-primary bg-orange-50/50' : 'bg-diner-surface'} border border-diner-border p-6 rounded-2xl shadow-sm flex flex-col relative group transition-all hover:shadow-md`}>
                                                <div className="absolute top-5 right-5 flex space-x-3 opacity-100 transition-opacity">
                                                    <input type="checkbox" checked={isSelected} onChange={() => toggleRecipeSelected(recipe.id)} className="mt-1" />
                                                    <button onClick={() => handleEditRecipe(recipe)} className="text-stone-400 hover:text-diner-primary transition-colors bg-white rounded-full shadow-sm p-1">
                                                        <Icon name="edit2" className="w-4 h-4" />
                                                    </button>
                                                    <button onClick={() => handleDeleteRecipe(recipe.id)} className="text-stone-400 hover:text-diner-danger transition-colors bg-white rounded-full shadow-sm p-1">
                                                        <Icon name="trash2" className="w-4 h-4" />
                                                    </button>
                                                </div>
                                                <h3 className="text-xl font-bold mb-3 pr-24 text-diner-text leading-tight">{recipe.name}</h3>
                                                {recipe.tags.length > 0 && (
                                                    <div className="flex flex-wrap gap-2 mb-4">
                                                        {recipe.tags.map(tag => (
                                                            <button key={tag} onClick={() => setActiveTag(tag)} className="bg-stone-50 text-diner-muted border border-diner-border rounded-full px-2.5 py-1 text-xs font-bold hover:text-diner-primary transition-colors">
                                                                {tag}
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                                <button onClick={() => toggleRecipeCollapsed(recipe.id)} className="self-start mb-4 text-sm text-diner-primary font-bold hover:underline">
                                                    {isCollapsed ? 'Expand details' : 'Collapse details'}
                                                </button>
                                                {!isCollapsed && (
                                                    <div className="flex-1 space-y-2.5 mb-6">
                                                        <div className="text-xs text-diner-muted font-bold uppercase tracking-wider border-b border-stone-100 pb-2 mb-3">Ingredients Needed:</div>
                                                        {recipe.ingredients.slice(0, 5).map(ing => (
                                                            <div key={ing.id} className="text-sm flex justify-between items-center">
                                                                <span className="truncate pr-2 text-diner-muted font-medium">
                                                                    <span className="text-diner-text font-bold">{ing.inputQty} {UNITS[ing.inputUnit]?.label.split(' ')[0] || ing.inputUnit}</span> {ing.name}
                                                                </span>
                                                                <span className="shrink-0 text-stone-400 text-xs font-semibold">{formatCurrency(ing.cost)}</span>
                                                            </div>
                                                        ))}
                                                        {recipe.ingredients.length > 5 && (
                                                            <div className="text-xs text-stone-400 italic mt-3 font-medium">+ {recipe.ingredients.length - 5} more ingredients</div>
                                                        )}
                                                    </div>
                                                )}
                                                <div className="pt-5 border-t border-stone-100 flex justify-between items-end mb-5 mt-auto">
                                                    <span className="text-xs text-diner-muted font-bold uppercase tracking-wider">Total Cost</span>
                                                    <span className="text-2xl font-bold text-diner-accent">{formatCurrency(getRecipeCurrentCost(recipe))}</span>
                                                </div>
                                                <button 
                                                    onClick={() => handleCookDish(recipe)}
                                                    className="w-full bg-diner-primary hover:bg-diner-hover text-white font-bold py-3 rounded-lg flex justify-center items-center transition-colors shadow-sm"
                                                >
                                                    <Icon name="flame" className="w-4 h-4 mr-2" /> Cook Dish
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function Ledger({ logs, saveLogs }) {
            const totalSpent = logs.reduce((sum, log) => sum + log.totalCost, 0);

            const handleClearLogs = () => {
                if (confirm("Are you sure you want to permanently clear all Ledger history? This cannot be undone.")) {
                    saveLogs([]);
                }
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animation-fadeIn">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-bold">Ledger</h2>
                        {logs.length > 0 && (
                            <button 
                                onClick={handleClearLogs}
                                className="bg-red-50 text-diner-danger hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-bold transition-colors shadow-sm text-sm"
                            >
                                Clear Ledger
                            </button>
                        )}
                    </div>

                    <div className="bg-diner-surface border border-diner-border p-6 rounded-2xl shadow-sm mb-8 flex justify-between items-center">
                        <div>
                            <h3 className="text-diner-muted font-medium mb-1">Total Expenses Tracked</h3>
                            <p className="text-4xl font-bold text-diner-danger">-{formatCurrency(totalSpent)}</p>
                        </div>
                        <div className="text-right">
                            <h3 className="text-diner-muted font-medium mb-1">Dishes Cooked</h3>
                            <p className="text-3xl font-bold text-diner-text">{logs.length}</p>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {logs.length === 0 ? (
                            <div className="py-16 text-center border-2 border-dashed border-stone-300 bg-stone-50/50 rounded-3xl text-diner-muted font-medium">
                                The Ledger is empty. Cook a dish in the Kitchen to see logs here.
                            </div>
                        ) : (
                            [...logs].reverse().map(log => (
                                <div key={log.id} className="bg-diner-surface border border-diner-border rounded-xl p-6 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex flex-col md:flex-row md:justify-between md:items-start mb-5 gap-4">
                                        <div>
                                            <h3 className="text-lg font-bold text-diner-text flex items-center">
                                                <Icon name="checkCircle" className="w-5 h-5 text-diner-accent mr-2" />
                                                Cooked: {log.recipeName}
                                            </h3>
                                            <p className="text-sm text-diner-muted mt-1 font-medium ml-7">
                                                {new Date(log.date).toLocaleString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                            </p>
                                        </div>
                                        <span className="text-xl font-bold text-diner-danger bg-red-50 px-3 py-1 rounded-lg">-{formatCurrency(log.totalCost)}</span>
                                    </div>
                                    <div className="bg-stone-50 rounded-lg p-5 border border-stone-200">
                                        <div className="text-xs font-bold uppercase tracking-wider text-diner-muted mb-3">Items Deducted from Pantry:</div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                            {log.ingredients.map((ing, idx) => (
                                                <div key={idx} className="text-sm text-diner-muted flex items-start">
                                                    <span className="w-1.5 h-1.5 rounded-full bg-stone-300 mt-1.5 mr-2 shrink-0"></span>
                                                    <span>
                                                        <span className="text-diner-text font-bold mr-1">{ing.qty} {UNITS[ing.unit]?.label.split(' ')[0] || ing.unit}</span> 
                                                        {ing.name}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
