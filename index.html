                <div className="p-4 text-xs font-medium text-diner-muted text-center border-t border-diner-border bg-stone-50 space-y-3">
                    <button
                        type="button"
                        onClick={() => { setIsGuideOpen(true); setIsSidebarOpen(false); }}
                        className="w-full bg-diner-primary hover:bg-diner-hover text-white rounded-lg py-2 px-3 font-bold transition-colors flex items-center justify-center"
                    >
                        <Icon name="helpCircle" className="w-4 h-4 mr-2" /> Guide
                    </button>
                    <button
                        type="button"
                        onClick={toggleDarkMode}
                        className="w-full border border-diner-border text-diner-text hover:bg-white rounded-lg py-2 px-3 font-bold transition-colors"
                    >
                        {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                    </button>

                    {storageMode === 'portable' ? (
                        <div className="space-y-2">
                            <button
                                type="button"
                                onClick={downloadBackup}
                                className="w-full bg-diner-primary hover:bg-diner-hover text-white rounded-lg py-2 px-3 font-bold transition-colors"
                            >
                                {unsavedChanges ? 'Save Backup Copy *' : 'Save Backup Copy'}
                            </button>
                            <button
                                type="button"
                                onClick={downloadSeparateJsonFiles}
                                className="w-full border border-diner-border text-diner-text hover:bg-white rounded-lg py-2 px-3 font-bold transition-colors"
                            >
                                Download Data Files
                            </button>
                            <div>Download a backup after changes.</div>
                        </div>
                    ) : (
                        <div>Every change saves to your folder.</div>
                    )}
                    {lastStorageMessage && <div className={unsavedChanges ? 'text-diner-primary font-bold' : ''}>{lastStorageMessage}</div>}
                </div>
            );

            const renderSidebarContent = (isDrawer = false) => (
                <>
                    <div className="p-5 sm:p-6 border-b border-diner-border flex items-center justify-between gap-3">
                        <div className="min-w-0">
                            <img src="logo.png" alt="Logo" className="h-11 mb-2 object-contain" onError={(e) => e.target.style.display = 'none'} />
                            <h1 className="font-bold text-lg leading-tight tracking-tight text-diner-text">Hickory House<br/><span className="text-diner-primary text-sm font-medium">Inventory Manager</span></h1>
                        </div>
                        {isDrawer && (
                            <button
                                type="button"
                                onClick={() => setIsSidebarOpen(false)}
                                className="shrink-0 rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 p-3 transition-colors"
                                aria-label="Close menu"
                            >
                                <Icon name="x" className="w-5 h-5" />
                            </button>
                        )}
                    </div>
                    <nav className="flex-1 px-4 py-5 space-y-2 overflow-y-auto">
                        {navItems.map(item => (
                            <SidebarBtn
                                key={item.id}
                                icon={item.icon}
                                label={item.label}
                                active={currentView === item.id}
                                onClick={() => handleNavigate(item.id)}
                            />
                        ))}
                    </nav>
                    {renderStorageControls()}
                </>
            );

            return (
                <div className="app-shell bg-diner-bg text-diner-text font-sans overflow-hidden flex flex-col md:flex-row">
                    <header className="md:hidden shrink-0 bg-diner-surface border-b border-diner-border shadow-sm z-30 px-4 py-3 flex items-center justify-between gap-3">
                        <button
                            type="button"
                            onClick={() => setIsSidebarOpen(true)}
                            className="rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 p-3 transition-colors"
                            aria-label="Open menu"
                        >
                            <span className="block w-5 h-0.5 bg-current rounded-full mb-1"></span>
                            <span className="block w-5 h-0.5 bg-current rounded-full mb-1"></span>
                            <span className="block w-5 h-0.5 bg-current rounded-full"></span>
                        </button>
                        <div className="min-w-0 flex-1 text-left">
                            <div className="text-xs font-bold uppercase tracking-wider text-diner-muted">Hickory House</div>
                            <div className="font-bold text-lg leading-tight truncate text-diner-text">{currentNavItem.label}</div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button
                                type="button"
                                onClick={() => setIsGuideOpen(true)}
                                className="rounded-xl bg-diner-primary text-white hover:bg-diner-hover px-3 py-2 text-xs font-bold transition-colors flex items-center"
                            >
                                <Icon name="helpCircle" className="w-4 h-4 mr-1" /> Guide
                            </button>
                            <button
                                type="button"
                                onClick={toggleDarkMode}
                                className="rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 px-3 py-2 text-xs font-bold transition-colors"
                            >
                                {isDarkMode ? 'Light' : 'Dark'}
                            </button>
                        </div>
                    </header>

                    {isSidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/45 backdrop-blur-sm z-40 md:hidden"
                            onClick={() => setIsSidebarOpen(false)}
                            aria-hidden="true"
                        />
                    )}
                    <aside className={`mobile-drawer fixed left-0 top-0 bottom-0 z-50 w-[86vw] max-w-xs bg-diner-surface border-r border-diner-border shadow-2xl flex flex-col transition-transform duration-300 md:hidden ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {renderSidebarContent(true)}
                    </aside>

                    <aside className="hidden md:flex w-64 bg-diner-surface border-r border-diner-border flex-col shadow-sm z-10">
                        {renderSidebarContent(false)}
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 relative mobile-content-pad">
                        {error && (
                            <div className="mb-4 bg-red-50 border border-red-200 text-diner-danger rounded-xl p-3 text-sm font-bold">
                                {error}
                            </div>
                        )}
                        {storageMode === 'portable' && unsavedChanges && (

        function Resupply({ inventory, saveInventory, onFinish }) {
            const [step, setStep] = useState(1);
            const [rawText, setRawText] = useState("");
            const [parsedRows, setParsedRows] = useState([]);
            const [columnMap, setColumnMap] = useState({});
            const [processedItems, setProcessedItems] = useState([]);
            const [importStatus, setImportStatus] = useState("");
            const [hideIgnoredColumns, setHideIgnoredColumns] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                let isMounted = true;
                readUiPreference(HIDE_IGNORED_COLUMNS_PREF_KEY, false).then((value) => {
                    if (isMounted) setHideIgnoredColumns(Boolean(value));
                });
                return () => { isMounted = false; };
            }, []);

            const openImportedRowsForMapping = (rows, sourceName = 'import') => {
                const normalizedRows = normalizeImportedRows(rows);
                if (normalizedRows.length === 0) {
                    alert('No readable rows were found in this import.');
                    setImportStatus('');
                    return;
                }

                const autoMap = getAutoColumnMap(normalizedRows);
                setParsedRows(normalizedRows);
                setColumnMap(autoMap);
                setImportStatus(`Imported ${normalizedRows.length} row${normalizedRows.length === 1 ? '' : 's'} from ${sourceName}. Confirm the detected columns below.`);
                setStep(2);
            };

            const processTextToRows = (text, sourceName = 'pasted data') => {
                if(!String(text || '').trim()) return;
                const rows = parseDelimitedText(text);
                openImportedRowsForMapping(rows, sourceName);
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                e.target.value = '';
                if (files.length === 0) return;

                setImportStatus(`Reading ${files.length} file${files.length === 1 ? '' : 's'}...`);
                const combinedRows = [];
                const importedNames = [];
                const failures = [];

                for (const file of files) {
                    try {
                        const rows = normalizeImportedRows(await parseResupplyFile(file));
                        if (rows.length === 0) {
                            failures.push(`${file.name}: no readable rows found`);
                            continue;
                        }
                        combinedRows.push(...rows);
                        importedNames.push(file.name || 'uploaded file');
                    } catch (err) {
                        console.error('Resupply import error:', file.name, err);
                        failures.push(`${file.name || 'Uploaded file'}: ${err.message || err}`);
                    }
                }

                if (combinedRows.length === 0) {
                    setImportStatus('');
                    alert('Could not import the selected file(s):\n\n' + (failures.length ? failures.join('\n') : 'No readable table data was found.'));
                    return;
                }

                if (failures.length > 0) {
                    setImportStatus(`Imported ${importedNames.length} file${importedNames.length === 1 ? '' : 's'}. ${failures.length} file${failures.length === 1 ? '' : 's'} could not be read.`);
                }

                openImportedRowsForMapping(combinedRows, importedNames.join(', ') || 'uploaded file');
            };

            const handleMapChange = (colIndex, role) => {
                const newMap = { ...columnMap };
                Object.keys(newMap).forEach(key => { if (newMap[key] === role && role !== 'ignore') delete newMap[key]; });
                newMap[colIndex] = role;
                setColumnMap(newMap);
            };

            const toggleHideIgnoredColumns = () => {
                setHideIgnoredColumns(prev => {
                    const next = !prev;
                    writeUiPreference(HIDE_IGNORED_COLUMNS_PREF_KEY, next);
                    return next;
                });
            };

            const getVisibleImportColumnIndexes = () => {
                const columnIndexes = parsedRows[0]?.map((_, colIndex) => colIndex) || [];
                if (!hideIgnoredColumns) return columnIndexes;
                const visible = columnIndexes.filter(colIndex => (columnMap[colIndex] || 'ignore') !== 'ignore');
                return visible.length > 0 ? visible : columnIndexes;
            };

            const processMappedData = () => {
                const nameCol = Object.keys(columnMap).find(key => columnMap[key] === 'name');
                const sizeCol = Object.keys(columnMap).find(key => columnMap[key] === 'size');
                const priceCol = Object.keys(columnMap).find(key => columnMap[key] === 'price');
                const expirationCol = Object.keys(columnMap).find(key => columnMap[key] === 'expiration');

                if (nameCol === undefined || sizeCol === undefined || priceCol === undefined) {
                    alert("Please choose the Item Name, Pack Size or Quantity, and Total Price columns before continuing.");
                    return;
                }

                const items = [];
                let startIndex = 0;
                const firstRowName = parsedRows[0][nameCol]?.toLowerCase() || "";
                if (firstRowName.includes('name') || firstRowName.includes('desc') || firstRowName.includes('item')) {
                    startIndex = 1;
                }

                for (let i = startIndex; i < parsedRows.length; i++) {
                    const row = parsedRows[i];
                    if (!row[nameCol]?.trim()) continue;

                    const name = row[nameCol].trim();
                    const sizeStr = row[sizeCol]?.trim() || "";
                    
                    const rawPrice = row[priceCol]?.replace(/[^0-9.]/g, '') || "0";
                    const totalPrice = parseFloat(rawPrice);
                    const importedExpirationDate = expirationCol === undefined ? '' : normalizeImportedExpirationDate(row[expirationCol] || '');

                    const sizeData = parsePackSizeString(sizeStr);

                    const safeTotalPrice = isNaN(totalPrice) ? 0 : Math.max(0, totalPrice);
                    const safeTotalBaseUnits = Math.max(0, toNumber(sizeData.totalBaseUnits, 1));

                    items.push({
                        id: 'import_' + Math.random().toString(36).substr(2, 9),
                        name: name,
                        originalSizeString: sizeStr,
                        totalPrice: safeTotalPrice,
                        purchasePrice: safeTotalPrice,
                        baseUnit: sizeData.baseUnit,
                        preferredUnit: sizeData.preferredUnit,
                        displayQuantity: toNumber(sizeData.displayQuantity, safeTotalBaseUnits / ((UNITS[sizeData.preferredUnit] || { toBase: 1 }).toBase || 1)),
                        displayUnit: sizeData.displayUnit || sizeData.preferredUnit,
                        totalBaseUnits: safeTotalBaseUnits,
                        costPerBaseUnit: calculateCostPerBaseUnit(safeTotalPrice, safeTotalBaseUnits),
                        expirationDate: importedExpirationDate
                    });
                }
                setProcessedItems(items);
                setStep(items.some(item => !item.expirationDate) ? 4 : 3);
            };

            const updateProcessedItem = (id, field, value) => {
                setProcessedItems(prev => prev.map(item => {
                    if (item.id === id) {
                        const updatedItem = { ...item, [field]: value };
                        if (field === 'expirationParts') {
                            updatedItem.expirationParts = value;
                            updatedItem.expirationDate = getExpirationDateFromParts(value);
                        }
                        if (field === 'expirationDate') {
                            updatedItem.expirationDate = normalizeImportedExpirationDate(value);
                            updatedItem.expirationParts = getExpirationParts(updatedItem.expirationDate);
                        }
                        if (field === 'totalPrice') {
                            updatedItem.totalPrice = Math.max(0, toNumber(value, 0));
                            updatedItem.purchasePrice = updatedItem.totalPrice;
                        }
                        if (field === 'displayQuantity') {
                            const unitInfo = UNITS[updatedItem.displayUnit] || UNITS[updatedItem.preferredUnit] || UNITS.ea;
                            updatedItem.displayQuantity = Math.max(0, toNumber(value, 0));
                            updatedItem.totalBaseUnits = updatedItem.displayQuantity * unitInfo.toBase;
                            updatedItem.baseUnit = unitInfo.baseUnit;
                            updatedItem.preferredUnit = updatedItem.displayUnit || updatedItem.preferredUnit;
                        }
                        if (field === 'totalBaseUnits') {
                            updatedItem.totalBaseUnits = Math.max(0, toNumber(value, 0));
                        }
                        if (field === 'totalPrice' || field === 'displayQuantity' || field === 'totalBaseUnits') {
                            updatedItem.costPerBaseUnit = calculateCostPerBaseUnit(updatedItem.totalPrice, updatedItem.totalBaseUnits);
                        }
                        return updatedItem;
                    }
                    return item;
                }));
            };

            const removeProcessedItem = (id) => {
                setProcessedItems(prev => prev.filter(item => item.id !== id));
            };

            const getProcessedItemExpirationInputValue = (item) => {
                return item.expirationParts || getExpirationParts(item.expirationDate || '');
            };

            const getValidatedProcessedItems = () => {
                let invalidItemName = '';
                const nextItems = processedItems.map(item => {
                    const parts = getProcessedItemExpirationInputValue(item);
                    const expirationDate = getExpirationDateFromParts(parts);
                    if (!invalidItemName && hasAnyExpirationDatePart(parts) && !expirationDate) {
                        invalidItemName = item.name || 'one imported item';
                    }
                    const { expirationParts, ...cleanItem } = item;
                    return {
                        ...cleanItem,
                        expirationDate: expirationDate || cleanItem.expirationDate || ''
                    };
                });

                if (invalidItemName) {
                    alert(`Please finish the expiration date for ${invalidItemName}, or clear its day, month, and year boxes.`);
                    return null;
                }

                return nextItems;
            };

            const finalizeProcessedExpirationDates = () => {
                const nextItems = getValidatedProcessedItems();
                if (!nextItems) return false;
                setProcessedItems(nextItems);
                return true;
            };

            const continueToReviewWithoutAddingDates = () => {
                if (finalizeProcessedExpirationDates()) setStep(3);
            };

            const continueToReviewWithDates = () => {
                if (finalizeProcessedExpirationDates()) setStep(3);
            };

            const confirmAndMerge = () => {
                const readyItems = getValidatedProcessedItems();
                if (!readyItems) return;

                const cleanItems = readyItems.map(i => {
                    const expirationParts = i.expirationParts || getExpirationParts(i.expirationDate || '');
                    const { expirationParts: _unusedExpirationParts, ...itemForSave } = i;
                    return normalizeInventoryItem({
                        ...itemForSave,
                        totalPrice: Math.max(0, toNumber(i.totalPrice, 0)),
                        purchasePrice: Math.max(0, toNumber(i.totalPrice, 0)),
                        preferredUnit: i.displayUnit || i.preferredUnit,
                        totalBaseUnits: Math.max(0, toNumber(i.totalBaseUnits, 0)),
                        originalSizeString: i.originalSizeString || `${toNumber(i.displayQuantity, 0)} ${i.displayUnit || i.preferredUnit || i.baseUnit}`,
                        expirationDate: getExpirationDateFromParts(expirationParts) || normalizeImportedExpirationDate(i.expirationDate || '')
                    });
                });
                const result = mergeNewItemsIntoInventory(inventory, cleanItems);

                if (result.conflicts.length > 0) {
                    alert('Some items could not be saved:\n\n' + result.conflicts.join('\n'));
                    return;
                }

                saveInventory(result.inventory);
                onFinish();
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animation-fadeIn">
                    <h2 className="text-3xl font-bold">Add Many Items</h2>
                    {importStatus && <p className="text-sm font-bold text-diner-primary">{importStatus}</p>}

                    {step === 1 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden flex flex-col md:flex-row">
                            <div className="p-8 flex-1 border-b md:border-b-0 md:border-r border-diner-border flex flex-col justify-center items-center text-center">
                                <Icon name="clipboard" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Paste a Copied Table</h3>
                                <textarea 
                                    value={rawText}
                                    onChange={(e) => setRawText(e.target.value)}
                                    placeholder="Paste item names, pack sizes, and prices here..."
                                    className="w-full h-48 bg-diner-bg border border-diner-border rounded-xl p-4 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-mono text-sm resize-none"
                                />
                                <button 
                                    onClick={() => processTextToRows(rawText, 'Pasted data')}
                                    disabled={!rawText.trim()}
                                    className="mt-4 bg-diner-primary disabled:opacity-50 hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Next: Check Pasted Items
                                </button>
                            </div>
                            <div className="p-8 flex-1 flex flex-col justify-center items-center text-center bg-stone-50">
                                <div className="text-stone-400 mb-4 font-bold text-lg">OR</div>
                                <Icon name="upload" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Choose a File</h3>
                                <input 
                                    type="file" 
                                    ref={fileInputRef} 
                                    onChange={handleFileUpload} 
                                    accept={SUPPORTED_RESUPPLY_ACCEPT} 
                                    multiple
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Choose File
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex flex-col md:flex-row md:justify-between md:items-center gap-4 bg-stone-50">
                                <div>
                                    <h3 className="text-xl font-bold">Check Columns</h3>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                                    <button
                                        type="button"
                                        onClick={toggleHideIgnoredColumns}
                                        className={`${hideIgnoredColumns ? 'bg-diner-primary text-white hover:bg-diner-hover' : 'bg-white text-diner-text hover:bg-stone-50 border border-diner-border'} font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm`}
                                        title="Hide or show columns currently marked Ignore Column. This preference is remembered on this device."
                                    >
                                        {hideIgnoredColumns ? 'Show Unneeded Columns' : 'Hide Unneeded Columns'}
                                    </button>
                                    <button 
                                        onClick={processMappedData}
                                        className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center shadow-sm"
                                    >
                                        Next <Icon name="arrowRight" className="w-4 h-4 ml-2" />
                                    </button>
                                </div>
                            </div>
                            <div className="resupply-map-scroll">
                                <table className="resupply-map-table text-left text-sm whitespace-nowrap">
                                    <thead className="bg-diner-surface border-b border-diner-border text-diner-text">
                                        <tr>
                                            {getVisibleImportColumnIndexes().map((colIndex) => (
                                                <th key={colIndex} className="p-3 font-semibold align-top">
                                                    <select 
                                                        value={columnMap[colIndex] || 'ignore'} 
                                                        onChange={(e) => handleMapChange(colIndex, e.target.value)}
                                                        title="Choose what this imported column represents"
                                                        className="resupply-map-select bg-white border border-stone-300 rounded p-2 text-stone-800 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium"
                                                    >
                                                        <option value="ignore">Ignore This Column</option>
                                                        <option value="name">Item Name</option>
                                                        <option value="size">Pack Size or Quantity</option>
                                                        <option value="price">Total Price</option>
                                                        <option value="expiration">Expiration Date</option>
                                                    </select>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100 text-diner-muted">
                                        {parsedRows.slice(0, 5).map((row, rowIndex) => (
                                            <tr key={rowIndex} className="hover:bg-stone-50">
                                                {getVisibleImportColumnIndexes().map((colIndex) => {
                                                    const cell = row[colIndex] || '';
                                                    return <td key={colIndex} title={cell} className="p-3 resupply-map-cell border-r border-stone-100">{cell}</td>;
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {step === 4 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-8 text-center space-y-5">
                                <div className="mx-auto w-16 h-16 rounded-2xl bg-orange-50 border border-orange-200 flex items-center justify-center text-diner-primary">
                                    <Icon name="alertTriangle" className="w-8 h-8" />
                                </div>
                                <div>
                                    <h3 className="text-2xl font-bold text-diner-text">Add Expiration Dates?</h3>
                                    <p className="text-diner-muted mt-2">
                                        {processedItems.filter(item => !item.expirationDate).length} imported item{processedItems.filter(item => !item.expirationDate).length === 1 ? '' : 's'} do not have an expiration date.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-xl mx-auto">
                                    <button
                                        type="button"
                                        onClick={confirmAndMerge}
                                        className="border border-diner-border text-diner-text hover:bg-stone-50 font-bold py-3 px-5 rounded-xl transition-colors"
                                    >
                                        No, Save Without Dates
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setStep(5)}
                                        className="bg-diner-primary hover:bg-diner-hover text-white font-bold py-3 px-5 rounded-xl transition-colors shadow-sm"
                                    >
                                        Yes, Add Dates
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 5 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-orange-50/50">
                                <div>
                                    <h3 className="text-xl font-bold text-diner-primary">Set Expiration Dates</h3>
                                </div>
                                <button
                                    type="button"
                                    onClick={confirmAndMerge}
                                    className="bg-diner-primary hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center shadow-sm"
                                >
                                    Save Items to Pantry <Icon name="save" className="w-4 h-4 ml-2" />
                                </button>
                            </div>
                            <div className="divide-y divide-stone-100 max-h-[65vh] overflow-y-auto">
                                {processedItems.filter(item => !item.expirationDate || item.expirationParts).map(item => (
                                    <div key={item.id} className="p-5 grid grid-cols-1 md:grid-cols-[1fr_22rem] gap-4 items-center hover:bg-stone-50 transition-colors">
                                        <div>
                                            <div className="font-bold text-diner-text">{item.name}</div>
                                            <div className="text-sm text-diner-muted">{item.originalSizeString || formatUnitDisplay(item.totalBaseUnits, item.baseUnit)}</div>
                                        </div>
                                        <ExpirationDateInputs
                                            value={getProcessedItemExpirationInputValue(item)}
                                            onChange={(parts) => updateProcessedItem(item.id, 'expirationParts', parts)}
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex justify-between items-center bg-orange-50/50">
                                <div>
                                    <h3 className="text-xl font-bold text-diner-primary">Review Items Before Saving</h3>
                                </div>
                                <button 
                                    onClick={confirmAndMerge}
                                    className="bg-diner-primary hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center shadow-sm"
                                >
                                    <Icon name="save" className="w-4 h-4 mr-2" /> Save Items to Pantry
                                </button>
                            </div>
                            <div className="overflow-x-auto max-h-[60vh] overflow-y-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-stone-50 text-diner-text sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="p-4 font-semibold">Item</th>
                                            <th className="p-4 font-semibold">Original Pack</th>
                                            <th className="p-4 font-semibold w-32">Total Price ($)</th>
                                            <th className="p-4 font-semibold w-56">Imported Quantity</th>
                                            <th className="p-4 font-semibold w-80">Expiration Date</th>
                                            <th className="p-4 font-semibold">Final Cost / Unit</th>
                                            <th className="p-4 font-semibold text-center">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100">
                                        {processedItems.map((item) => (
                                            <tr key={item.id} className="hover:bg-stone-50 transition-colors">
                                                <td className="p-4 font-medium text-diner-text">{item.name}</td>
                                                <td className="p-4 text-diner-muted">{item.originalSizeString}</td>
                                                <td className="p-4">
                                                    <input 
                                                        type="number" step="0.01" 
                                                        value={item.totalPrice} 
                                                        onChange={(e) => updateProcessedItem(item.id, 'totalPrice', e.target.value)}
                                                        className="w-full bg-white border border-stone-300 rounded p-2 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-bold text-diner-accent"
                                                    />
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex items-center space-x-2">
                                                        <input 
                                                            type="number" step="any" 
                                                            value={item.displayQuantity ?? ''} 
                                                            onChange={(e) => updateProcessedItem(item.id, 'displayQuantity', e.target.value)}
                                                            className="w-28 bg-white border border-stone-300 rounded p-2 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary text-diner-text font-medium"
                                                        />
                                                        <span className="text-diner-muted font-medium">{(UNITS[item.displayUnit] || UNITS[item.preferredUnit] || { label: item.displayUnit || item.preferredUnit || item.baseUnit }).label || item.displayUnit || item.preferredUnit || item.baseUnit}</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 min-w-72">
                                                    <ExpirationDateInputs
                                                        value={getProcessedItemExpirationInputValue(item)}
                                                        onChange={(parts) => updateProcessedItem(item.id, 'expirationParts', parts)}
                                                    />
                                                </td>
                                                <td className="p-4 text-diner-muted font-medium">
                                                    {formatCurrency(toNumber(item.totalPrice, 0) / Math.max(toNumber(item.displayQuantity, 0), 1))} / {item.displayUnit || item.preferredUnit || item.baseUnit}
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button onClick={() => removeProcessedItem(item.id)} className="text-stone-400 hover:text-diner-danger p-2 transition-colors"><Icon name="trash2" className="w-4 h-4"/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Pantry({ inventory, saveInventory }) {
            const [searchTerm, setSearchTerm] = useState("");
            const [isEditing, setIsEditing] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [selectedIds, setSelectedIds] = useState([]);
            const [showExpiringOnly, setShowExpiringOnly] = useState(false);

            useEffect(() => {
                setSelectedIds(prev => prev.filter(id => inventory.some(item => item.id === id)));
            }, [inventory]);

            const normalizedInventory = inventory.map(normalizeInventoryItem);
            const filteredInventory = normalizedInventory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesExpirationFilter = !showExpiringOnly || isExpiredOrNearExpired(item);
                return matchesSearch && matchesExpirationFilter;
            });
            const visibleIds = filteredInventory.map(item => item.id);
            const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selectedIds.includes(id));
            const expiringCount = normalizedInventory.filter(isExpiredOrNearExpired).length;

            const toggleSelect = (id) => {
                setSelectedIds(prev => prev.includes(id) ? prev.filter(existingId => existingId !== id) : [...prev, id]);
            };

            const toggleSelectVisible = () => {
                if (allVisibleSelected) {
                    const visibleSet = new Set(visibleIds);
                    setSelectedIds(prev => prev.filter(id => !visibleSet.has(id)));
                } else {
                    setSelectedIds(prev => Array.from(new Set([...prev, ...visibleIds])));
                }
            };

            const handleSave = (item) => {
                const newItem = normalizeInventoryItem({
                    ...item,
                    id: item.id || Date.now().toString()
                });
                const result = mergeNewItemsIntoInventory(
                    inventory,
                    [newItem],
                    { excludeIds: editItem?.id ? [editItem.id] : [] }
                );

                if (result.conflicts.length > 0) {
                    alert(result.conflicts.join('\n'));
                    return;
                }

                saveInventory(result.inventory);
                setIsEditing(false);
                setEditItem(null);
            };

            const handleDelete = (id) => {
                if(confirm("Delete this pantry item?")) {
                    saveInventory(inventory.filter(i => i.id !== id));
                    setSelectedIds(prev => prev.filter(selectedId => selectedId !== id));
                }
            };

            const handleDeleteSelected = () => {
                if (selectedIds.length === 0) return;
                if(confirm(`Delete ${selectedIds.length} checked pantry item${selectedIds.length === 1 ? '' : 's'}?`)) {
                    const selectedSet = new Set(selectedIds);
                    saveInventory(inventory.filter(i => !selectedSet.has(i.id)));
                    setSelectedIds([]);
                }
            };

            const ExpirationBadge = ({ item }) => {
                const status = getExpirationStatus(item);
                if (status.state === 'expired') {
                    return <span className="inline-flex rounded-full bg-red-100 text-diner-danger border border-red-200 px-2.5 py-1 text-xs font-bold">{status.label}</span>;
                }
                if (status.state === 'warning') {
                    return <span className="inline-flex rounded-full bg-orange-50 text-diner-primary border border-orange-200 px-2.5 py-1 text-xs font-bold">{status.label}</span>;
                }
                if (status.state === 'ok') {
                    return <span className="inline-flex rounded-full bg-stone-50 text-diner-muted border border-diner-border px-2.5 py-1 text-xs font-medium">{item.expirationDate}</span>;
                }
                if (status.state === 'unknown') {
                    return <span className="inline-flex rounded-full bg-stone-50 text-diner-muted border border-diner-border px-2.5 py-1 text-xs font-medium">{status.label}</span>;
                }
                return <span className="text-stone-400 text-xs font-medium">No date</span>;
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animation-fadeIn">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                        <div>
                            <h2 className="text-3xl font-bold">Pantry</h2>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button 
                                onClick={() => setShowExpiringOnly(prev => !prev)}
                                className={`${showExpiringOnly ? 'bg-diner-primary text-white' : 'bg-white text-diner-text border border-diner-border hover:bg-stone-50'} px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm`}
                            >
                                {showExpiringOnly ? 'Show All' : `Expiring (${expiringCount})`}
                            </button>
                            <button 
                                onClick={toggleSelectVisible}
                                disabled={visibleIds.length === 0}
                                className="bg-white disabled:opacity-50 border border-diner-border hover:bg-stone-50 text-diner-text px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm"
                            >
                                {allVisibleSelected ? 'Uncheck Shown' : 'Check Shown Items'}
                            </button>
                            <button 
                                onClick={handleDeleteSelected}
                                disabled={selectedIds.length === 0}
                                className="bg-red-50 disabled:opacity-50 text-diner-danger hover:bg-red-100 border border-red-200 px-4 py-2.5 rounded-lg font-bold transition-colors shadow-sm"
                            >
                                Delete Checked ({selectedIds.length})
                            </button>
                            <button 
                                onClick={() => { setEditItem(null); setIsEditing(true); }}
                                className="bg-diner-primary hover:bg-diner-hover text-white px-5 py-2.5 rounded-lg font-bold flex items-center transition-colors shadow-sm"
                            >
                                <Icon name="plus" className="w-4 h-4 mr-2" /> Add One Item
                            </button>
                        </div>
                    </div>

                    <div className="bg-diner-surface border border-diner-border rounded-2xl overflow-hidden shadow-sm">
                        <div className="p-4 border-b border-diner-border flex items-center bg-stone-50">
                            <Icon name="search" className="w-5 h-5 text-stone-400 mr-3" />
                            <input 
                                type="text" 
                                placeholder="Type an item name to find it..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="bg-transparent border-none outline-none text-diner-text w-full placeholder-stone-400 font-medium"
                            />
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-white border-b border-diner-border text-diner-text">
                                    <tr>
                                        <th className="p-4 font-semibold w-12">
                                            <input type="checkbox" checked={allVisibleSelected} onChange={toggleSelectVisible} disabled={visibleIds.length === 0} />
                                        </th>
                                        <th className="p-4 font-semibold">Item Name</th>
                                        <th className="p-4 font-semibold text-right">Dish Cost</th>
                                        <th className="p-4 font-semibold text-right">Amount Left</th>
                                        <th className="p-4 font-semibold text-right">Small Unit Cost</th>
                                        <th className="p-4 font-semibold">Expiration</th>
                                        <th className="p-4 font-semibold text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-stone-100">
                                    {filteredInventory.length === 0 ? (
                                        <tr><td colSpan="7" className="p-8 text-center text-diner-muted font-medium">No items found. Press Add One Item to add your first pantry item.</td></tr>
                                    ) : filteredInventory.map(item => (
                                        <tr key={item.id} className={`${selectedIds.includes(item.id) ? 'bg-orange-50/50' : 'hover:bg-stone-50'} transition-colors`}>
                                            <td className="p-4">
                                                <input type="checkbox" checked={selectedIds.includes(item.id)} onChange={() => toggleSelect(item.id)} />
                                            </td>
                                            <td className="p-4 font-semibold text-diner-text">{item.name}</td>
                                            <td className="p-4 text-right text-diner-accent font-bold">{formatCurrency(item.totalPrice)}</td>
                                            <td className="p-4 text-right font-semibold text-diner-text">{formatUnitDisplay(item.totalBaseUnits, item.baseUnit)}</td>
                                            <td className="p-4 text-right text-diner-muted font-medium">{formatCurrency(item.costPerBaseUnit)} / {item.baseUnit}</td>
                                            <td className="p-4"><ExpirationBadge item={item} /></td>
                                            <td className="p-4">
                                                <div className="flex items-center justify-center space-x-3">
                                                    <button onClick={() => { setEditItem(item); setIsEditing(true); }} className="text-stone-400 hover:text-diner-primary transition-colors"><Icon name="edit2" className="w-4 h-4"/></button>
                                                    <button onClick={() => handleDelete(item.id)} className="text-stone-400 hover:text-diner-danger transition-colors"><Icon name="trash2" className="w-4 h-4"/></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isEditing && (
                        <ItemModal 
                            item={editItem} 
                            onClose={() => setIsEditing(false)} 
                            onSave={handleSave} 
                        />
                    )}
                </div>
            );
        }

        function ItemModal({ item, onClose, onSave }) {
            const startingUnit = item ? getItemPreferredUnit(item, false) : "g";
            const startingUnitInfo = UNITS[startingUnit] || UNITS.g;
            const startingQty = item ? toNumber(item.totalBaseUnits, 0) / startingUnitInfo.toBase : "";

            const [name, setName] = useState(item ? item.name : "");
            const [totalPrice, setTotalPrice] = useState(item ? item.totalPrice : "");
            const [inputQty, setInputQty] = useState(startingQty);
            const [inputUnit, setInputUnit] = useState(startingUnit);
            const [expirationParts, setExpirationParts] = useState(() => getExpirationParts(item ? item.expirationDate : ""));

            const handleSave = (e) => {
                e.preventDefault();
                const unitTypeObj = UNITS[inputUnit];
                const qty = toNumber(inputQty, NaN);
                const price = toNumber(totalPrice, NaN);

                if (!name.trim() || !unitTypeObj || !Number.isFinite(qty) || qty <= 0 || !Number.isFinite(price) || price < 0) {
                    alert('Please enter a valid name, price, quantity, and unit before saving.');
                    return;
                }

                const expirationDate = getExpirationDateFromParts(expirationParts);
                if (!expirationDate && hasAnyExpirationDatePart(expirationParts)) {
                    alert('Please choose a valid day, month, and year for the expiration date, or leave all three boxes blank.');
                    return;
                }

                const baseUnitStr = unitTypeObj.baseUnit;
                const totalBaseUnits = qty * unitTypeObj.toBase;

                onSave({
                    id: item ? item.id : null,
                    name: name.trim(),
                    totalPrice: price,
                    purchasePrice: price,
                    originalSizeString: `${qty} ${inputUnit}`,
                    totalBaseUnits: totalBaseUnits,
                    baseUnit: baseUnitStr,
                    preferredUnit: inputUnit,
                    expirationDate: expirationDate
                });
            };

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-diner-surface border border-diner-border rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animation-fadeIn">
                        <div className="flex justify-between items-center p-6 border-b border-diner-border bg-stone-50">
                            <h3 className="text-xl font-bold text-diner-text">{item ? 'Edit Pantry Item' : 'Add One Pantry Item'}</h3>
                            <button onClick={onClose} className="text-stone-400 hover:text-diner-danger transition-colors"><Icon name="x" className="w-5 h-5"/></button>
                        </div>
                        <form onSubmit={handleSave} className="p-6 space-y-5">
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-1">What did you buy?</label>
                                <input required type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="Example: Onion, Brisket, BBQ Sauce" />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-1">What did the whole purchase cost? ($)</label>
                                <input required type="number" step="0.01" min="0" value={totalPrice} onChange={e=>setTotalPrice(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="Example: 25.50" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-diner-text mb-1">How much did you buy?</label>
                                    <input required type="number" step="any" min="0" value={inputQty} onChange={e=>setInputQty(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary transition-shadow" placeholder="Example: 15" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-diner-text mb-1">Measurement</label>
                                    <select value={inputUnit} onChange={e=>setInputUnit(e.target.value)} className="w-full bg-white border border-stone-300 rounded-lg p-3 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium transition-shadow">
                                        {Object.entries(UNITS)
                                            .filter(([key]) => key !== 'dzn')
                                            .map(([key, val]) => (
                                            <option key={key} value={key}>{val.label}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-diner-text mb-2">Expiration Date <span className="text-diner-muted font-normal">(optional)</span></label>
                                <ExpirationDateInputs value={expirationParts} onChange={setExpirationParts} />
                            </div>
                            <div className="pt-4">
                                <button type="submit" className="w-full bg-diner-primary hover:bg-diner-hover text-white font-bold py-3.5 rounded-xl transition-colors shadow-sm">
                                    Save Pantry Item
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function Kitchen({ inventory, recipes, saveRecipes }) {
            const makeId = () => Date.now().toString() + '_' + Math.random().toString(36).slice(2, 8);
            const [isCreating, setIsCreating] = useState(false);
            const [editingRecipeId, setEditingRecipeId] = useState(null);
            
            const [recipeName, setRecipeName] = useState("");
            const [recipeTags, setRecipeTags] = useState("");
            const [showTagSuggestions, setShowTagSuggestions] = useState(false);
            const [ingredients, setIngredients] = useState([]); 
            
            const [selectedItemId, setSelectedItemId] = useState("");
            const [ingredientQty, setIngredientQty] = useState("");
            const [ingredientUnit, setIngredientUnit] = useState("g");
            const [dishSearch, setDishSearch] = useState("");
            const [activeTag, setActiveTag] = useState("");
            const [selectedRecipeIds, setSelectedRecipeIds] = useState([]);
            const [collapsedRecipeIds, setCollapsedRecipeIds] = useState([]);
            const [collapsedTagGroups, setCollapsedTagGroups] = useState([]);

            const normalizedRecipes = recipes.map(normalizeRecipe);
            const recipeListNeedsNormalization = recipes.some(recipe => (
                !recipe?.id ||
                !Array.isArray(recipe?.tags) ||
                !Array.isArray(recipe?.ingredients) ||
                typeof recipe?.name !== 'string' ||
                typeof recipe?.totalCost !== 'number'
            ));

            useEffect(() => {
                if (recipeListNeedsNormalization) {
                    saveRecipes(normalizedRecipes);
                }
            }, [recipeListNeedsNormalization, recipes.length]);

            useEffect(() => {
                setSelectedRecipeIds(prev => prev.filter(id => normalizedRecipes.some(recipe => recipe.id === id)));
                setCollapsedRecipeIds(prev => prev.filter(id => normalizedRecipes.some(recipe => recipe.id === id)));
                setCollapsedTagGroups(prev => prev.filter(key => key === 'untagged' || key.startsWith('tag:')));
            }, [recipes]);

            const selectedItem = inventory.find(i => i.id === selectedItemId);
            const ingredientUnitOptions = getKitchenUnitEntriesForItem();
            const allTags = Array.from(new Set(normalizedRecipes.flatMap(recipe => recipe.tags))).sort((a, b) => a.localeCompare(b));

            const cloneIngredient = (ingredient, index = 0) => ({
                id: ingredient?.id || `${makeId()}_${index}`,
                inventoryId: ingredient?.inventoryId || ingredient?.itemId || ingredient?.itemID || '',
                name: String(ingredient?.name || '').trim(),
                inputQty: ingredient?.inputQty ?? ingredient?.quantity ?? ingredient?.qty ?? ingredient?.amount ?? '',
                inputUnit: ingredient?.inputUnit || ingredient?.unit || ingredient?.measurement || 'ea',
                baseQty: toNumber(ingredient?.baseQty, 0),
                baseUnitType: ingredient?.baseUnitType || ingredient?.baseUnit || 'ea',
                cost: toNumber(ingredient?.cost, 0),
                isEstimated: Boolean(ingredient?.isEstimated),
                conversionNote: ingredient?.conversionNote || ''
            });

            const recalculateIngredient = (ingredient, index = 0) => {
                const cloned = cloneIngredient(ingredient, index);
                const item = inventory.find(i => i.id === cloned.inventoryId);
                const unitKey = String(cloned.inputUnit || '').toLowerCase();
                const qty = toNumber(cloned.inputQty, NaN);

                if (!item || !UNITS[unitKey] || !Number.isFinite(qty) || qty <= 0) {
                    return {
                        ...cloned,
                        inputUnit: unitKey || cloned.inputUnit,
                        cost: toNumber(cloned.cost, 0)
                    };
                }

                const normalizedItem = normalizeInventoryItem(item);
                const conversion = convertIngredientForItem(qty, unitKey, normalizedItem);
                return {
                    ...cloned,
                    inventoryId: normalizedItem.id,
                    name: normalizedItem.name,
                    inputQty: cloned.inputQty,
                    inputUnit: unitKey,
                    baseQty: conversion.baseQty,
                    baseUnitType: conversion.baseUnitType,
                    cost: conversion.cost,
                    isEstimated: conversion.isEstimated,
                    conversionNote: conversion.conversionNote
                };
            };

            const recalculateIngredients = (ingredientList) => {
                return (ingredientList || []).map((ingredient, index) => recalculateIngredient(ingredient, index));
            };

            const getIngredientsCurrentCost = (ingredientList) => {
                return recalculateIngredients(ingredientList).reduce((sum, ingredient) => sum + toNumber(ingredient.cost, 0), 0);
            };

            const filteredRecipes = normalizedRecipes.filter(recipe => {
                const query = dishSearch.trim().toLowerCase();
                const haystack = [
                    recipe.name,
                    recipe.tags.join(' '),
                    recipe.ingredients.map(ing => ing.name).join(' ')
                ].join(' ').toLowerCase();
                const matchesSearch = !query || haystack.includes(query);
                const matchesTag = !activeTag || recipe.tags.includes(activeTag);
                return matchesSearch && matchesTag;
            });

            const visibleRecipeIds = filteredRecipes.map(recipe => recipe.id);
            const allVisibleRecipesSelected = visibleRecipeIds.length > 0 && visibleRecipeIds.every(id => selectedRecipeIds.includes(id));

            const groupedFilteredRecipes = (() => {
                if (activeTag) {
                    return filteredRecipes.length > 0 ? [{ key: `tag:${activeTag}`, label: activeTag, recipes: filteredRecipes }] : [];
                }

                const groups = [];
                allTags.forEach(tag => {
                    const taggedRecipes = filteredRecipes.filter(recipe => recipe.tags.includes(tag));
                    if (taggedRecipes.length > 0) {
                        groups.push({ key: `tag:${tag}`, label: tag, recipes: taggedRecipes });
                    }
                });

                const untaggedRecipes = filteredRecipes.filter(recipe => recipe.tags.length === 0);
                if (untaggedRecipes.length > 0) {
                    groups.push({ key: 'untagged', label: allTags.length > 0 ? 'No Tag' : 'Dishes', recipes: untaggedRecipes });
                }

                return groups;
            })();

            const visibleTagGroupKeys = groupedFilteredRecipes.map(group => group.key);

            const resetRecipeForm = () => {
                setRecipeName("");
                setRecipeTags("");
                setIngredients([]);
                setSelectedItemId("");
                setIngredientQty("");
                setIngredientUnit("g");
                setShowTagSuggestions(false);
            };

            const handleSelectedItemChange = (e) => {
                const nextItemId = e.target.value;
                const nextItem = inventory.find(i => i.id === nextItemId);
                setSelectedItemId(nextItemId);
                setIngredientUnit(getKitchenDefaultUnitForItem(nextItem));
            };

            const getRecipeCurrentCost = (recipe) => {
                return getIngredientsCurrentCost(recipe.ingredients || []);
            };

            const addTagToInput = (tag) => {
                const cleanTag = String(tag || '').trim();
                if (!cleanTag) return;
                const currentTags = normalizeTags(recipeTags);
                const hasTag = currentTags.some(existingTag => existingTag.toLowerCase() === cleanTag.toLowerCase());
                const nextTags = hasTag ? currentTags : [...currentTags, cleanTag];
                setRecipeTags(nextTags.join(', '));
                setShowTagSuggestions(false);
            };

            const handleAddIngredient = (e) => {
                e.preventDefault();
                const item = inventory.find(i => i.id === selectedItemId);
                if (!item) return;

                const normalizedItem = normalizeInventoryItem(item);
                const unitInfo = UNITS[ingredientUnit];
                const qty = toNumber(ingredientQty, NaN);

                if (!unitInfo) {
                    alert('Please choose a valid measurement unit.');
                    return;
                }

                if (!Number.isFinite(qty) || qty <= 0) {
                    alert('Please enter an ingredient quantity greater than 0.');
                    return;
                }

                const conversion = convertIngredientForItem(qty, ingredientUnit, normalizedItem);

                const newIngredient = {
                    id: makeId(),
                    inventoryId: normalizedItem.id,
                    name: normalizedItem.name,
                    inputQty: ingredientQty,
                    inputUnit: ingredientUnit,
                    baseQty: conversion.baseQty,
                    baseUnitType: conversion.baseUnitType,
                    cost: conversion.cost,
                    isEstimated: conversion.isEstimated,
                    conversionNote: conversion.conversionNote
                };

                setIngredients(prev => [...prev, newIngredient]);
                setIngredientQty("");
                setSelectedItemId("");
                setIngredientUnit("g");
            };

            const handleIngredientMeasurementChange = (ingredientId, field, value) => {
                setIngredients(prev => prev.map((ingredient, index) => {
                    if (ingredient.id !== ingredientId) return ingredient;
                    return recalculateIngredient({ ...ingredient, [field]: value }, index);
                }));
            };

            const handleRemoveIngredient = (ingredientId) => {
                setIngredients(prev => prev.filter(ingredient => ingredient.id !== ingredientId));
            };

            const handleSaveRecipe = () => {
                if (!recipeName.trim()) return;

                const recalculatedIngredients = recalculateIngredients(ingredients);
                const totalCost = recalculatedIngredients.reduce((sum, ing) => sum + toNumber(ing.cost, 0), 0);
                const newRecipe = normalizeRecipe({
                    id: editingRecipeId || makeId(),
                    name: recipeName.trim(),
                    tags: normalizeTags(recipeTags),
                    ingredients: recalculatedIngredients,
                    totalCost
                });

                const existingRecipes = normalizedRecipes;
                const recipeExists = editingRecipeId && existingRecipes.some(recipe => recipe.id === editingRecipeId);
                const nextRecipes = recipeExists
                    ? existingRecipes.map(recipe => recipe.id === editingRecipeId ? newRecipe : recipe)
                    : [...existingRecipes, newRecipe];

                saveRecipes(nextRecipes);
                setIsCreating(false);
                setEditingRecipeId(null);
                resetRecipeForm();
            };

            const handleEditRecipe = (recipe) => {
                const normalizedRecipe = normalizeRecipe(recipe);
                setRecipeName(normalizedRecipe.name);
                setRecipeTags(normalizedRecipe.tags.join(', '));
                setIngredients(recalculateIngredients((normalizedRecipe.ingredients || []).map((ingredient, index) => cloneIngredient(ingredient, index))));
                setEditingRecipeId(normalizedRecipe.id);
                setSelectedItemId("");
                setIngredientQty("");
                setIngredientUnit("g");
                setShowTagSuggestions(false);
                setIsCreating(true);
            };

            const handleDeleteRecipe = (id) => {
                if (confirm("Delete this dish?")) {
                    saveRecipes(normalizedRecipes.filter(recipe => recipe.id !== id));
                    setSelectedRecipeIds(prev => prev.filter(recipeId => recipeId !== id));
                }
            };

            const toggleRecipeSelected = (id) => {
                setSelectedRecipeIds(prev => prev.includes(id) ? prev.filter(recipeId => recipeId !== id) : [...prev, id]);
            };

            const toggleSelectVisibleRecipes = () => {
                if (allVisibleRecipesSelected) {
                    const visibleSet = new Set(visibleRecipeIds);
                    setSelectedRecipeIds(prev => prev.filter(id => !visibleSet.has(id)));
                } else {
                    setSelectedRecipeIds(prev => Array.from(new Set([...prev, ...visibleRecipeIds])));
                }
            };

            const handleDeleteSelectedRecipes = () => {
                if (selectedRecipeIds.length === 0) return;
                if (confirm(`Delete ${selectedRecipeIds.length} selected dish${selectedRecipeIds.length === 1 ? '' : 'es'}?`)) {
                    const selectedSet = new Set(selectedRecipeIds);
                    saveRecipes(normalizedRecipes.filter(recipe => !selectedSet.has(recipe.id)));
                    setSelectedRecipeIds([]);
                }
            };

            const toggleRecipeCollapsed = (id) => {
                setCollapsedRecipeIds(prev => prev.includes(id) ? prev.filter(recipeId => recipeId !== id) : [...prev, id]);
            };

            const toggleTagGroupCollapsed = (key) => {
                setCollapsedTagGroups(prev => prev.includes(key) ? prev.filter(groupKey => groupKey !== key) : [...prev, key]);
            };

            const collapseAllVisibleRecipes = () => {
                setCollapsedRecipeIds(prev => Array.from(new Set([...prev, ...visibleRecipeIds])));
                setCollapsedTagGroups(prev => Array.from(new Set([...prev, ...visibleTagGroupKeys])));
            };

            const expandAllVisibleRecipes = () => {
                const visibleSet = new Set(visibleRecipeIds);
                const visibleGroupSet = new Set(visibleTagGroupKeys);
                setCollapsedRecipeIds(prev => prev.filter(id => !visibleSet.has(id)));
                setCollapsedTagGroups(prev => prev.filter(key => !visibleGroupSet.has(key)));
            };

            const handleCloseCreate = () => {
                setIsCreating(false);
                setEditingRecipeId(null);
                resetRecipeForm();
            };

            const startNewRecipe = () => {
                setEditingRecipeId(null);
                resetRecipeForm();
                setIsCreating(true);
            };

            const renderRecipeCard = (recipe) => {
                const isCollapsed = collapsedRecipeIds.includes(recipe.id);
                const isSelected = selectedRecipeIds.includes(recipe.id);
                const currentCost = getRecipeCurrentCost(recipe);

                return (
                    <div key={recipe.id} className={`${isSelected ? 'ring-2 ring-diner-primary bg-orange-50/50' : 'bg-diner-surface'} border border-diner-border p-6 rounded-2xl shadow-sm flex flex-col relative group transition-all hover:shadow-md`}>
                        <div className="absolute top-5 right-5 flex space-x-3 opacity-100 transition-opacity">
                            <input type="checkbox" checked={isSelected} onChange={() => toggleRecipeSelected(recipe.id)} className="mt-1" />
                            <button onClick={() => handleEditRecipe(recipe)} className="text-stone-400 hover:text-diner-primary transition-colors bg-white rounded-full shadow-sm p-1" title="Edit dish">
                                <Icon name="edit2" className="w-4 h-4" />
                            </button>
                            <button onClick={() => handleDeleteRecipe(recipe.id)} className="text-stone-400 hover:text-diner-danger transition-colors bg-white rounded-full shadow-sm p-1" title="Delete dish">
                                <Icon name="trash2" className="w-4 h-4" />
                            </button>
                        </div>
                        <h3 className="text-xl font-bold mb-3 pr-24 text-diner-text leading-tight">{recipe.name}</h3>
                        {recipe.tags.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-4">
                                {recipe.tags.map(tag => (
                                    <button key={tag} onClick={() => setActiveTag(tag)} className="bg-stone-50 text-diner-muted border border-diner-border rounded-full px-2.5 py-1 text-xs font-bold hover:text-diner-primary transition-colors">
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        )}
                        <button onClick={() => toggleRecipeCollapsed(recipe.id)} className="self-start mb-4 text-sm text-diner-primary font-bold hover:underline">
                            {isCollapsed ? 'Expand details' : 'Collapse details'}
                        </button>
                        {!isCollapsed && (
                            <div className="flex-1 space-y-2.5 mb-6">
                                <div className="text-xs text-diner-muted font-bold uppercase tracking-wider border-b border-stone-100 pb-2 mb-3">Ingredients:</div>
                                {recipe.ingredients.length === 0 ? (
                                    <div className="text-sm text-diner-muted font-medium">No ingredients saved.</div>
                                ) : recipe.ingredients.slice(0, 5).map((ing, index) => {
                                    const recalculated = recalculateIngredient(ing, index);
                                    return (
                                        <div key={ing.id || `${recipe.id}_${index}`} className="text-sm flex justify-between items-center gap-3">
                                            <span className="truncate pr-2 text-diner-muted font-medium">
                                                <span className="text-diner-text font-bold">{recalculated.inputQty} {UNITS[recalculated.inputUnit]?.label.split(' ')[0] || recalculated.inputUnit}</span> {recalculated.name}
                                            </span>
                                            <span className="shrink-0 text-stone-400 text-xs font-semibold">{formatCurrency(recalculated.cost)}</span>
                                        </div>
                                    );
                                })}
                                {recipe.ingredients.length > 5 && (
                                    <div className="text-xs text-stone-400 italic mt-3 font-medium">+ {recipe.ingredients.length - 5} more ingredients</div>
                                )}
                            </div>
                        )}
                        <div className="pt-5 border-t border-stone-100 flex justify-between items-end mt-auto">
                            <span className="text-xs text-diner-muted font-bold uppercase tracking-wider">Dish Cost</span>
                            <span className="text-2xl font-bold text-diner-accent">{formatCurrency(currentCost)}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animation-fadeIn">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                        <div>
                            <h2 className="text-3xl font-bold">Kitchen</h2>
                        </div>
                        {!isCreating && (
                            <button 
                                onClick={startNewRecipe}
                                className="bg-stone-800 hover:bg-stone-700 text-white px-5 py-2.5 rounded-lg font-bold flex items-center transition-colors shadow-sm"
                            >
                                <Icon name="plus" className="w-4 h-4 mr-2" /> Create Dish
                            </button>
                        )}
                    </div>

                    {isCreating ? (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl p-8 shadow-sm space-y-8 animation-fadeIn">
                            <div className="flex flex-col lg:flex-row lg:justify-between gap-4 mb-2 border-b border-stone-200 pb-4">
                                <div className="flex-1 space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-diner-text mb-1">Dish Name</label>
                                        <input 
                                            type="text" 
                                            placeholder="e.g. Buttermilk Pancakes"
