                    } else {
                        portableFileInputRef.current?.click();
                    }
                    return;
                }

                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setDirHandle(handle);
                    setStorageMode('folder');
                    await loadData(handle);
                    setUnsavedChanges(false);
                    setLastStorageMessage('Folder connected.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Failed to get folder access: ' + err.message);
                }
            };

            const handleChooseFolder = () => {
                setError(null);

                if (supportsDirectoryPicker) {
                    requestAccess();
                    return;
                }

                if (supportsFolderUpload && portableFolderInputRef.current) {
                    portableFolderInputRef.current.click();
                    return;
                }

                portableFileInputRef.current?.click();
            };

            const startPortableMode = () => {
                applyLoadedData({ inventory: [], recipes: [], logs: [] }, 'portable', 'Portable mode started.');
            };

            const handlePortableFilesUpload = async (event) => {
                const files = Array.from(event.target.files || []);
                event.target.value = '';
                if (files.length === 0) return;

                try {
                    const loaded = { inventory: [], recipes: [], logs: [] };
                    let foundKnownFile = false;

                    for (const file of files) {
                        const text = await readFileText(file);
                        if (!text.trim()) continue;
                        const parsed = JSON.parse(text);
                        const filename = String(file.name || '').toLowerCase();

                        if (!Array.isArray(parsed) && (Array.isArray(parsed.inventory) || Array.isArray(parsed.recipes) || Array.isArray(parsed.logs))) {
                            loaded.inventory = Array.isArray(parsed.inventory) ? parsed.inventory : loaded.inventory;
                            loaded.recipes = Array.isArray(parsed.recipes) ? parsed.recipes : loaded.recipes;
                            loaded.logs = Array.isArray(parsed.logs) ? parsed.logs : loaded.logs;
                            foundKnownFile = true;
                            continue;
                        }

                        if (filename.includes('inventory') && Array.isArray(parsed)) {
                            loaded.inventory = parsed;
                            foundKnownFile = true;
                        } else if ((filename.includes('recipe') || filename.includes('dish')) && Array.isArray(parsed)) {
                            loaded.recipes = parsed;
                            foundKnownFile = true;
                        } else if (filename.includes('log') && Array.isArray(parsed)) {
                            loaded.logs = parsed;
                            foundKnownFile = true;
                        }
                    }

                    if (!foundKnownFile) {
                        const selectedFolderPath = files.find(file => String(file.webkitRelativePath || '').includes('/'))?.webkitRelativePath || '';
                        if (selectedFolderPath) {
                            applyLoadedData(loaded, 'portable', 'Folder opened.');
                            return;
                        }
                        throw new Error('No supported Hickory House backup, inventory.json, recipes.json, or logs.json file was found.');
                    }

                    applyLoadedData(loaded, 'portable', 'Folder opened.');
                } catch (err) {
                    console.error('Portable import error:', err);
                    setError('Could not import the selected file(s): ' + err.message);
                }
            };

            const loadData = async (handle) => {
                try {
                    const nextData = { inventory: [], recipes: [], logs: [] };

                    try {
                        const fileHandle = await handle.getFileHandle('inventory.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if (text.trim()) {
                            const parsed = JSON.parse(text);
                            nextData.inventory = Array.isArray(parsed) ? parsed.map(normalizeInventoryItem) : [];
                        }
                    } catch (e) {
                        nextData.inventory = [];
                    }

                    try {
                        const fileHandle = await handle.getFileHandle('recipes.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if (text.trim()) {
                            const parsed = JSON.parse(text);
                            nextData.recipes = Array.isArray(parsed) ? parsed.map(normalizeRecipe) : [];
                        }
                    } catch (e) {
                        nextData.recipes = [];
                    }

                    try {
                        const fileHandle = await handle.getFileHandle('logs.json', { create: false });
                        const file = await fileHandle.getFile();
                        const text = await file.text();
                        if(text.trim()) nextData.logs = JSON.parse(text);
                    } catch (e) {
                        nextData.logs = [];
                    }

                    setInventory(nextData.inventory);
                    setRecipes(nextData.recipes);
                    setLogs(Array.isArray(nextData.logs) ? nextData.logs : []);
                } catch (err) {
                    console.error('Error loading data', err);
                    setError('Could not read files from the selected directory.');
                }
            };

            const buildPortableBackup = (overrides = {}) => ({
                app: 'Hickory House Inventory',
                version: 2,
                exportedAt: new Date().toISOString(),
                inventory: (overrides.inventory || inventory).map(normalizeInventoryItem),
                recipes: (overrides.recipes || recipes).map(normalizeRecipe),
                logs: Array.isArray(overrides.logs || logs) ? (overrides.logs || logs) : []
            });

            const saveJsonBlob = async (filename, payload) => {
                const json = JSON.stringify(payload, null, 2);
                const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
                let shareFile = null;

                try {
                    if (typeof File === 'function') {
                        shareFile = new File([blob], filename, { type: 'application/json' });
                    }
                } catch (err) {
                    shareFile = null;
                }

                try {
                    if (shareFile && navigator.canShare && navigator.share && navigator.canShare({ files: [shareFile] })) {
                        await navigator.share({
                            files: [shareFile],
                            title: 'Hickory House Backup',
                            text: 'Save this Hickory House inventory backup to Files, iCloud Drive, or another safe location.'
                        });
                        return;
                    }
                } catch (err) {
                    // Fall through to the standard download path.
                }

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.rel = 'noopener';
                document.body.appendChild(link);
                link.click();
                link.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };

            const downloadBackup = async () => {
                try {
                    const dateStamp = new Date().toISOString().slice(0, 10);
                    await saveJsonBlob(`hickory-house-backup-${dateStamp}.json`, buildPortableBackup());
                    setUnsavedChanges(false);
                    setLastStorageMessage('Backup exported.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Could not export backup: ' + err.message);
                }
            };

            const downloadSeparateJsonFiles = async () => {
                try {
                    await saveJsonBlob('inventory.json', inventory.map(normalizeInventoryItem));
                    await saveJsonBlob('recipes.json', recipes.map(normalizeRecipe));
                    await saveJsonBlob('logs.json', Array.isArray(logs) ? logs : []);
                    setUnsavedChanges(false);
                    setLastStorageMessage('JSON files exported.');
                    setError(null);
                } catch (err) {
                    if (err.name !== 'AbortError') setError('Could not export JSON files: ' + err.message);
                }
            };

            const saveData = async (type, data) => {
                const normalizedData = type === 'inventory'
                    ? data.map(normalizeInventoryItem)
                    : type === 'recipes'
                        ? data.map(normalizeRecipe)
                        : data;

                if (storageMode === 'portable') {
                    if (type === 'inventory') setInventory(normalizedData);
                    if (type === 'recipes') setRecipes(normalizedData);
                    if (type === 'logs') setLogs(Array.isArray(normalizedData) ? normalizedData : []);
                    setUnsavedChanges(true);
                    setLastStorageMessage('Changes saved for this session. Export a backup to keep them.');
                    return;
                }

                if (!dirHandle) return;
                try {
                    const filename = type === 'inventory' ? 'inventory.json' : type === 'recipes' ? 'recipes.json' : 'logs.json';
                    const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify(normalizedData, null, 2));
                    await writable.close();

                    if (type === 'inventory') setInventory(normalizedData);
                    if (type === 'recipes') setRecipes(normalizedData);
                    if (type === 'logs') setLogs(Array.isArray(normalizedData) ? normalizedData : []);
                    setUnsavedChanges(false);
                    setLastStorageMessage(`${filename} saved directly to your chosen folder.`);
                } catch (err) {
                    console.error(`Error saving ${type}`, err);
                    setError(`Failed to save ${type} to file system.`);
                }
            };

            const totalInventoryValue = inventory.reduce((sum, item) => sum + (item.totalPrice || 0), 0);

            if (isCheckingAccess) {
                return <div className="flex h-screen items-center justify-center bg-diner-bg text-diner-primary"><Icon name="loader2" className="animate-spin w-10 h-10" /></div>;
            }

            if (!storageMode) {
                return (
                    <div className="min-h-screen bg-diner-bg text-diner-text p-6 flex items-center justify-center">
                        <div className="w-full max-w-md text-center">
                            <img src="logo.png" alt="Hickory House Logo" className="w-44 mx-auto mb-6 object-contain" onError={(e) => e.target.style.display = 'none'} />

                            <div className="bg-diner-surface border border-diner-border rounded-2xl p-8 shadow-xl space-y-5">
                                <div className="mx-auto w-20 h-20 rounded-2xl bg-orange-50 border border-orange-200 flex items-center justify-center text-diner-primary shadow-sm">
                                    <Icon name="folderOpen" className="w-11 h-11" />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold text-diner-text">Folder Save</h1>
                                    <p className="text-diner-muted text-sm mt-2">Choose the folder that stores your Hickory House files.</p>
                                </div>

                                <input
                                    ref={portableFileInputRef}
                                    type="file"
                                    multiple
                                    accept=".json,application/json"
                                    onChange={handlePortableFilesUpload}
                                    className="hidden"
                                />
                                <input
                                    ref={portableFolderInputRef}
                                    type="file"
                                    multiple
                                    accept=".json,application/json"
                                    onChange={handlePortableFilesUpload}
                                    className="hidden"
                                />

                                <button
                                    type="button"
                                    onClick={handleChooseFolder}
                                    className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3.5 px-6 rounded-xl w-full transition-colors flex items-center justify-center shadow-sm"
                                >
                                    <Icon name="folderOpen" className="w-5 h-5 mr-2" /> Choose Folder
                                </button>

                                <button
                                    type="button"
                                    onClick={() => setIsGuideOpen(true)}
                                    className="border border-diner-border text-diner-text hover:bg-stone-50 font-bold py-3 px-6 rounded-xl w-full transition-colors flex items-center justify-center"
                                >
                                    <Icon name="helpCircle" className="w-5 h-5 mr-2" /> Guide
                                </button>

                                <button
                                    type="button"
                                    onClick={toggleDarkMode}
                                    className="border border-diner-border text-diner-text hover:bg-stone-50 font-bold py-3 px-6 rounded-xl w-full transition-colors"
                                >
                                    {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                                </button>
                            </div>

                            {lastStorageMessage && <p className="text-center text-sm text-diner-muted font-medium mt-4">{lastStorageMessage}</p>}
                            {error && <p className="text-center text-diner-danger text-sm font-medium mt-4">{error}</p>}
                        </div>
                        {isGuideOpen && <GuideModal onClose={() => setIsGuideOpen(false)} />}
                    </div>
                );
            }

            const navItems = [
                { id: 'register', icon: 'fileText', label: 'Register' },
                { id: 'pantry', icon: 'folderOpen', label: 'Pantry' },
                { id: 'resupply', icon: 'clipboard', label: 'Resupply' },
                { id: 'kitchen', icon: 'calculator', label: 'Kitchen' },
                { id: 'ledger', icon: 'book', label: 'Ledger' }
            ];
            const currentNavItem = navItems.find(item => item.id === currentView) || navItems[0];

            const handleNavigate = (view) => {
                setCurrentView(view);
                setIsSidebarOpen(false);
            };

            const renderStorageControls = () => (
                <div className="p-4 text-xs font-medium text-diner-muted text-center border-t border-diner-border bg-stone-50 space-y-3">
                    <button
                        type="button"
                        onClick={() => { setIsGuideOpen(true); setIsSidebarOpen(false); }}
                        className="w-full bg-diner-primary hover:bg-diner-hover text-white rounded-lg py-2 px-3 font-bold transition-colors flex items-center justify-center"
                    >
                        <Icon name="helpCircle" className="w-4 h-4 mr-2" /> Guide
                    </button>
                    <button
                        type="button"
                        onClick={toggleDarkMode}
                        className="w-full border border-diner-border text-diner-text hover:bg-white rounded-lg py-2 px-3 font-bold transition-colors"
                    >
                        {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                    </button>

                    {storageMode === 'portable' ? (
                        <div className="space-y-2">
                            <button
                                type="button"
                                onClick={downloadBackup}
                                className="w-full bg-diner-primary hover:bg-diner-hover text-white rounded-lg py-2 px-3 font-bold transition-colors"
                            >
                                {unsavedChanges ? 'Export Backup *' : 'Export Backup'}
                            </button>
                            <button
                                type="button"
                                onClick={downloadSeparateJsonFiles}
                                className="w-full border border-diner-border text-diner-text hover:bg-white rounded-lg py-2 px-3 font-bold transition-colors"
                            >
                                Export 3 JSON Files
                            </button>
                            <div>Portable mode. Export after changes.</div>
                        </div>
                    ) : (
                        <div>Folder mode. Data saves directly.</div>
                    )}
                    {lastStorageMessage && <div className={unsavedChanges ? 'text-diner-primary font-bold' : ''}>{lastStorageMessage}</div>}
                </div>
            );

            const renderSidebarContent = (isDrawer = false) => (
                <>
                    <div className="p-5 sm:p-6 border-b border-diner-border flex items-center justify-between gap-3">
                        <div className="min-w-0">
                            <img src="logo.png" alt="Logo" className="h-11 mb-2 object-contain" onError={(e) => e.target.style.display = 'none'} />
                            <h1 className="font-bold text-lg leading-tight tracking-tight text-diner-text">Hickory House<br/><span className="text-diner-primary text-sm font-medium">Inventory Manager</span></h1>
                        </div>
                        {isDrawer && (
                            <button
                                type="button"
                                onClick={() => setIsSidebarOpen(false)}
                                className="shrink-0 rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 p-3 transition-colors"
                                aria-label="Close menu"
                            >
                                <Icon name="x" className="w-5 h-5" />
                            </button>
                        )}
                    </div>
                    <nav className="flex-1 px-4 py-5 space-y-2 overflow-y-auto">
                        {navItems.map(item => (
                            <SidebarBtn
                                key={item.id}
                                icon={item.icon}
                                label={item.label}
                                active={currentView === item.id}
                                onClick={() => handleNavigate(item.id)}
                            />
                        ))}
                    </nav>
                    {renderStorageControls()}
                </>
            );

            return (
                <div className="app-shell bg-diner-bg text-diner-text font-sans overflow-hidden flex flex-col md:flex-row">
                    <header className="md:hidden shrink-0 bg-diner-surface border-b border-diner-border shadow-sm z-30 px-4 py-3 flex items-center justify-between gap-3">
                        <button
                            type="button"
                            onClick={() => setIsSidebarOpen(true)}
                            className="rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 p-3 transition-colors"
                            aria-label="Open menu"
                        >
                            <span className="block w-5 h-0.5 bg-current rounded-full mb-1"></span>
                            <span className="block w-5 h-0.5 bg-current rounded-full mb-1"></span>
                            <span className="block w-5 h-0.5 bg-current rounded-full"></span>
                        </button>
                        <div className="min-w-0 flex-1 text-left">
                            <div className="text-xs font-bold uppercase tracking-wider text-diner-muted">Hickory House</div>
                            <div className="font-bold text-lg leading-tight truncate text-diner-text">{currentNavItem.label}</div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button
                                type="button"
                                onClick={() => setIsGuideOpen(true)}
                                className="rounded-xl bg-diner-primary text-white hover:bg-diner-hover px-3 py-2 text-xs font-bold transition-colors flex items-center"
                            >
                                <Icon name="helpCircle" className="w-4 h-4 mr-1" /> Guide
                            </button>
                            <button
                                type="button"
                                onClick={toggleDarkMode}
                                className="rounded-xl border border-diner-border bg-white text-diner-text hover:bg-stone-50 px-3 py-2 text-xs font-bold transition-colors"
                            >
                                {isDarkMode ? 'Light' : 'Dark'}
                            </button>
                        </div>
                    </header>

                    {isSidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/45 backdrop-blur-sm z-40 md:hidden"
                            onClick={() => setIsSidebarOpen(false)}
                            aria-hidden="true"
                        />
                    )}
                    <aside className={`mobile-drawer fixed left-0 top-0 bottom-0 z-50 w-[86vw] max-w-xs bg-diner-surface border-r border-diner-border shadow-2xl flex flex-col transition-transform duration-300 md:hidden ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        {renderSidebarContent(true)}
                    </aside>

                    <aside className="hidden md:flex w-64 bg-diner-surface border-r border-diner-border flex-col shadow-sm z-10">
                        {renderSidebarContent(false)}
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 relative mobile-content-pad">
                        {error && (
                            <div className="mb-4 bg-red-50 border border-red-200 text-diner-danger rounded-xl p-3 text-sm font-bold">
                                {error}
                            </div>
                        )}
                        {storageMode === 'portable' && unsavedChanges && (
                            <div className="mb-4 bg-orange-50 border border-orange-200 text-diner-primary rounded-xl p-3 text-sm font-bold flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                <span>Unsaved file changes. Export a backup before closing or switching apps.</span>
                                <button type="button" onClick={downloadBackup} className="bg-diner-primary text-white rounded-lg py-2 px-4 font-bold">Export Backup</button>
                            </div>
                        )}
                        {currentView === 'register' && (
                            <Register 
                                inventory={inventory} 
                                recipes={recipes} 
                                totalValue={totalInventoryValue}
                                onNavigate={handleNavigate}
                            />
                        )}
                        {currentView === 'pantry' && (
                            <Pantry 
                                inventory={inventory} 
                                saveInventory={(data) => saveData('inventory', data)} 
                            />
                        )}
                        {currentView === 'resupply' && (
                            <Resupply 
                                inventory={inventory} 
                                saveInventory={(data) => saveData('inventory', data)} 
                                onFinish={() => handleNavigate('pantry')}
                            />
                        )}
                        {currentView === 'kitchen' && (
                            <Kitchen 
                                inventory={inventory}
                                recipes={recipes}
                                logs={logs}
                                saveRecipes={(data) => saveData('recipes', data)}
                                saveInventory={(data) => saveData('inventory', data)}
                                saveLogs={(data) => saveData('logs', data)}
                            />
                        )}
                        {currentView === 'ledger' && (
                            <Ledger 
                                logs={logs}
                                saveLogs={(data) => saveData('logs', data)}
                            />
                        )}
                    </main>

                    <nav className="mobile-bottom-nav md:hidden fixed left-0 right-0 bottom-0 z-30 bg-diner-surface border-t border-diner-border shadow-2xl px-2 pt-2 grid grid-cols-5 gap-1">
                        {navItems.map(item => (
                            <button
                                type="button"
                                key={item.id}
                                onClick={() => handleNavigate(item.id)}
                                className={`rounded-xl px-1 py-2 flex flex-col items-center gap-1 text-[11px] font-bold transition-colors ${currentView === item.id ? 'bg-orange-50 text-diner-primary' : 'text-diner-muted hover:bg-stone-50 hover:text-diner-text'}`}
                            >
                                <Icon name={item.icon} className="w-5 h-5" />
                                <span className="truncate max-w-full">{item.label}</span>
                            </button>
                        ))}
                    </nav>

                    {isGuideOpen && <GuideModal onClose={() => setIsGuideOpen(false)} />}
                </div>
            );
        }

        const SidebarBtn = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center p-3 rounded-xl transition-all font-medium ${active ? 'bg-orange-50 text-diner-primary' : 'text-diner-muted hover:bg-stone-50 hover:text-diner-text'}`}
            >
                <Icon name={icon} className="w-5 h-5 mr-3" />
                <span>{label}</span>
            </button>
        );

        const GuideCard = ({ title, children }) => (
            <section className="bg-white border border-diner-border rounded-2xl p-5 shadow-sm space-y-3">
                <h3 className="text-xl font-bold text-diner-text flex items-center gap-2">
                    <span className="inline-flex w-8 h-8 rounded-full bg-orange-50 text-diner-primary items-center justify-center shrink-0"><Icon name="helpCircle" className="w-4 h-4" /></span>
                    {title}
                </h3>
                <div className="text-diner-muted text-sm leading-relaxed space-y-2">{children}</div>
            </section>
        );

        const GuideList = ({ items }) => (
            <ul className="list-disc pl-5 space-y-1.5">
                {items.map((item, index) => <li key={index}>{item}</li>)}
            </ul>
        );

        function GuideModal({ onClose }) {
            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[70] flex items-center justify-center p-3 sm:p-6" role="dialog" aria-modal="true" aria-label="Hickory House Inventory guide">
                    <div className="bg-diner-surface border border-diner-border rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90dvh] overflow-hidden animation-fadeIn flex flex-col">
                        <div className="p-5 sm:p-6 border-b border-diner-border bg-stone-50 flex items-start justify-between gap-4">
                            <div>
                                <div className="text-xs font-bold uppercase tracking-wider text-diner-primary mb-1">Beginner Guide</div>
                                <h2 className="text-2xl sm:text-3xl font-bold text-diner-text">How to use Hickory House Inventory</h2>
                                <p className="text-sm text-diner-muted mt-2 max-w-3xl">This guide explains the website in plain language. Use it when training a new employee or when you forget what a button does.</p>
                            </div>
                            <button
                                type="button"
                                onClick={onClose}
                                className="shrink-0 rounded-xl border border-diner-border bg-white text-diner-text hover:bg-red-50 hover:text-diner-danger p-3 transition-colors"
                                aria-label="Close guide"
                            >
                                <Icon name="x" className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="overflow-y-auto p-4 sm:p-6 space-y-5">
                            <GuideCard title="1. Starting the website">
                                <GuideList items={[
                                    'When the website first opens, press Choose Folder. Pick the folder where the inventory files should be stored.',
                                    'If the browser asks for permission, allow it. The app needs permission so it can read and save inventory.json, recipes.json, and logs.json in that folder.',
                                    'If your browser cannot save directly to a folder, the app will let you open existing JSON files instead. In that mode, use Export Backup before closing so your changes are not lost.',
                                    'Use Dark Mode or Light Mode to change the screen colors. This only changes how the app looks; it does not change your saved data.'
                                ]} />
                            </GuideCard>

                            <GuideCard title="2. Moving around the website">
                                <GuideList items={[
                                    'On a computer, use the menu on the left side of the screen.',
                                    'On a phone, use the buttons at the bottom of the screen. Press the menu button in the top left when you need the full menu.',
                                    'Register is the dashboard. Pantry is your item list. Resupply is for importing many items. Kitchen is for recipes and food cost. Ledger is the cooking history.',
                                    'Press the Guide button any time you need these instructions again.'
                                ]} />
                            </GuideCard>

                            <GuideCard title="3. Register dashboard">
                                <GuideList items={[
                                    'Total Pantry Value shows the current dollar value of everything in the pantry.',
                                    'Unique Items shows how many different pantry items are saved.',
                                    'Saved Dishes shows how many dishes or recipes are saved in the Kitchen.',
                                    'Recent Additions shows the newest pantry items. Press Manage Pantry to edit the full list.',
                                    'Press Go to Resupply when you want to add inventory from a spreadsheet, invoice, or copied table.'
                                ]} />
                            </GuideCard>

                            <GuideCard title="4. Pantry item list">

        function Register({ inventory, recipes, totalValue, onNavigate }) {
            return (
                <div className="space-y-8 max-w-5xl mx-auto animation-fadeIn">
                    <h2 className="text-3xl font-bold text-diner-text">Register</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-diner-surface border border-diner-border p-6 rounded-2xl shadow-sm">
                            <h3 className="text-diner-muted font-medium mb-1">Total Pantry Value</h3>

                        </div>
                        <div className="bg-diner-surface border border-diner-border p-6 rounded-2xl shadow-sm">

                            <p className="text-4xl font-bold text-diner-text">{inventory.length}</p>
                        </div>
                        <div className="bg-diner-surface border border-diner-border p-6 rounded-2xl shadow-sm">

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-diner-surface border border-diner-border rounded-2xl p-6 shadow-sm">

                            </div>

                            ) : (
                                <div className="space-y-3">
                                    {inventory.slice(-5).reverse().map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-3 bg-stone-50 rounded-lg border border-diner-border">
                                            <span className="font-medium text-diner-text">{item.name}</span>

                            )}
                        </div>
                        <div className="bg-diner-surface border border-diner-border rounded-2xl p-6 flex flex-col justify-center items-center text-center shadow-sm">
                            <Icon name="clipboard" className="w-12 h-12 text-stone-300 mb-4" />
                            <h3 className="text-xl font-bold mb-2">Resupply Inventory</h3>
                            <p className="text-diner-muted mb-6 max-w-xs text-sm">Copy and paste tables directly from Excel, Word, or upload CSV files to bulk add items.</p>
                            <button 
                                onClick={() => onNavigate('resupply')}
                                className="bg-stone-800 text-white hover:bg-stone-700 font-bold py-2.5 px-6 rounded-lg transition-colors shadow-sm"

        function Resupply({ inventory, saveInventory, onFinish }) {
            const [step, setStep] = useState(1);
            const [rawText, setRawText] = useState("");
            const [parsedRows, setParsedRows] = useState([]);
            const [columnMap, setColumnMap] = useState({});
            const [processedItems, setProcessedItems] = useState([]);
            const [importStatus, setImportStatus] = useState("");
            const [hideIgnoredColumns, setHideIgnoredColumns] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                let isMounted = true;
                readUiPreference(HIDE_IGNORED_COLUMNS_PREF_KEY, false).then((value) => {
                    if (isMounted) setHideIgnoredColumns(Boolean(value));
                });
                return () => { isMounted = false; };
            }, []);

            const openImportedRowsForMapping = (rows, sourceName = 'import') => {
                const normalizedRows = normalizeImportedRows(rows);
                if (normalizedRows.length === 0) {
                    alert('No readable rows were found in this import.');
                    setImportStatus('');
                    return;
                }

                const autoMap = getAutoColumnMap(normalizedRows);
                setParsedRows(normalizedRows);
                setColumnMap(autoMap);
                setImportStatus(`Imported ${normalizedRows.length} row${normalizedRows.length === 1 ? '' : 's'} from ${sourceName}. Confirm the detected columns below.`);
                setStep(2);
            };

            const processTextToRows = (text, sourceName = 'pasted data') => {
                if(!String(text || '').trim()) return;
                const rows = parseDelimitedText(text);
                openImportedRowsForMapping(rows, sourceName);
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                e.target.value = '';
                if (files.length === 0) return;

                setImportStatus(`Reading ${files.length} file${files.length === 1 ? '' : 's'}...`);
                const combinedRows = [];
                const importedNames = [];
                const failures = [];

                for (const file of files) {
                    try {
                        const rows = normalizeImportedRows(await parseResupplyFile(file));
                        if (rows.length === 0) {
                            failures.push(`${file.name}: no readable rows found`);
                            continue;
                        }
                        combinedRows.push(...rows);
                        importedNames.push(file.name || 'uploaded file');
                    } catch (err) {
                        console.error('Resupply import error:', file.name, err);
                        failures.push(`${file.name || 'Uploaded file'}: ${err.message || err}`);
                    }
                }

                if (combinedRows.length === 0) {
                    setImportStatus('');
                    alert('Could not import the selected file(s):\n\n' + (failures.length ? failures.join('\n') : 'No readable table data was found.'));
                    return;
                }

                if (failures.length > 0) {
                    setImportStatus(`Imported ${importedNames.length} file${importedNames.length === 1 ? '' : 's'}. ${failures.length} file${failures.length === 1 ? '' : 's'} could not be read.`);
                }

                openImportedRowsForMapping(combinedRows, importedNames.join(', ') || 'uploaded file');
            };

            const handleMapChange = (colIndex, role) => {
                const newMap = { ...columnMap };
                Object.keys(newMap).forEach(key => { if (newMap[key] === role && role !== 'ignore') delete newMap[key]; });
                newMap[colIndex] = role;
                setColumnMap(newMap);
            };

            const toggleHideIgnoredColumns = () => {
                setHideIgnoredColumns(prev => {
                    const next = !prev;
                    writeUiPreference(HIDE_IGNORED_COLUMNS_PREF_KEY, next);
                    return next;
                });
            };

            const getVisibleImportColumnIndexes = () => {
                const columnIndexes = parsedRows[0]?.map((_, colIndex) => colIndex) || [];
                if (!hideIgnoredColumns) return columnIndexes;
                const visible = columnIndexes.filter(colIndex => (columnMap[colIndex] || 'ignore') !== 'ignore');
                return visible.length > 0 ? visible : columnIndexes;
            };

            const processMappedData = () => {
                const nameCol = Object.keys(columnMap).find(key => columnMap[key] === 'name');
                const sizeCol = Object.keys(columnMap).find(key => columnMap[key] === 'size');
                const priceCol = Object.keys(columnMap).find(key => columnMap[key] === 'price');

                if (nameCol === undefined || sizeCol === undefined || priceCol === undefined) {
                    alert("Please map the 'Item Name', 'Pack Size', and 'Total Price' columns to proceed.");
                    return;
                }

                const items = [];
                let startIndex = 0;
                const firstRowName = parsedRows[0][nameCol]?.toLowerCase() || "";
                if (firstRowName.includes('name') || firstRowName.includes('desc') || firstRowName.includes('item')) {
                    startIndex = 1;
                }

                for (let i = startIndex; i < parsedRows.length; i++) {
                    const row = parsedRows[i];
                    if (!row[nameCol]?.trim()) continue;

                    const name = row[nameCol].trim();
                    const sizeStr = row[sizeCol]?.trim() || "";
                    
                    const rawPrice = row[priceCol]?.replace(/[^0-9.]/g, '') || "0";
                    const totalPrice = parseFloat(rawPrice);

                    const sizeData = parsePackSizeString(sizeStr);

                    const safeTotalPrice = isNaN(totalPrice) ? 0 : Math.max(0, totalPrice);
                    const safeTotalBaseUnits = Math.max(0, toNumber(sizeData.totalBaseUnits, 1));

                    items.push({
                        id: 'import_' + Math.random().toString(36).substr(2, 9),
                        name: name,
                        originalSizeString: sizeStr,
                        totalPrice: safeTotalPrice,
                        purchasePrice: safeTotalPrice,
                        baseUnit: sizeData.baseUnit,
                        preferredUnit: sizeData.preferredUnit,
                        displayQuantity: toNumber(sizeData.displayQuantity, safeTotalBaseUnits / ((UNITS[sizeData.preferredUnit] || { toBase: 1 }).toBase || 1)),
                        displayUnit: sizeData.displayUnit || sizeData.preferredUnit,
                        totalBaseUnits: safeTotalBaseUnits,
                        costPerBaseUnit: calculateCostPerBaseUnit(safeTotalPrice, safeTotalBaseUnits)
                    });
                }
                setProcessedItems(items);
                setStep(3);
            };

            const updateProcessedItem = (id, field, value) => {
                setProcessedItems(prev => prev.map(item => {
                    if (item.id === id) {
                        const updatedItem = { ...item, [field]: value };
                        if (field === 'totalPrice') {
                            updatedItem.totalPrice = Math.max(0, toNumber(value, 0));
                            updatedItem.purchasePrice = updatedItem.totalPrice;
                        }
                        if (field === 'displayQuantity') {
                            const unitInfo = UNITS[updatedItem.displayUnit] || UNITS[updatedItem.preferredUnit] || UNITS.ea;
                            updatedItem.displayQuantity = Math.max(0, toNumber(value, 0));
                            updatedItem.totalBaseUnits = updatedItem.displayQuantity * unitInfo.toBase;
                            updatedItem.baseUnit = unitInfo.baseUnit;
                            updatedItem.preferredUnit = updatedItem.displayUnit || updatedItem.preferredUnit;
                        }
                        if (field === 'totalBaseUnits') {
                            updatedItem.totalBaseUnits = Math.max(0, toNumber(value, 0));
                        }
                        if (field === 'totalPrice' || field === 'displayQuantity' || field === 'totalBaseUnits') {
                            updatedItem.costPerBaseUnit = calculateCostPerBaseUnit(updatedItem.totalPrice, updatedItem.totalBaseUnits);
                        }
                        return updatedItem;
                    }
                    return item;
                }));
            };

            const removeProcessedItem = (id) => {
                setProcessedItems(prev => prev.filter(item => item.id !== id));
            };

            const confirmAndMerge = () => {
                const cleanItems = processedItems.map(i => normalizeInventoryItem({
                    ...i,
                    totalPrice: Math.max(0, toNumber(i.totalPrice, 0)),
                    purchasePrice: Math.max(0, toNumber(i.totalPrice, 0)),
                    preferredUnit: i.displayUnit || i.preferredUnit,
                    totalBaseUnits: Math.max(0, toNumber(i.totalBaseUnits, 0)),
                    originalSizeString: i.originalSizeString || `${toNumber(i.displayQuantity, 0)} ${i.displayUnit || i.preferredUnit || i.baseUnit}`
                }));
                const result = mergeNewItemsIntoInventory(inventory, cleanItems);

                if (result.conflicts.length > 0) {
                    alert('Some items could not be saved:\n\n' + result.conflicts.join('\n'));
                    return;
                }

                saveInventory(result.inventory);
                onFinish();
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6 animation-fadeIn">
                    <h2 className="text-3xl font-bold">Resupply</h2>
                    <p className="text-diner-muted">Import inventory lists by pasting a table or uploading spreadsheet, delimited text, JSON, HTML/XML table, or other supported table files. Review the detected columns before saving.</p>
                    {importStatus && <p className="text-sm font-bold text-diner-primary">{importStatus}</p>}

                    {step === 1 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden flex flex-col md:flex-row">
                            <div className="p-8 flex-1 border-b md:border-b-0 md:border-r border-diner-border flex flex-col justify-center items-center text-center">
                                <Icon name="clipboard" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Option 1: Paste from Excel/Word</h3>
                                <p className="text-sm text-diner-muted mb-6">Select your data table in Excel, copy it, and paste it directly into the text box.</p>
                                <textarea 
                                    value={rawText}
                                    onChange={(e) => setRawText(e.target.value)}
                                    placeholder="Paste table data here..."
                                    className="w-full h-48 bg-diner-bg border border-diner-border rounded-xl p-4 text-diner-text outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-mono text-sm resize-none"
                                />
                                <button 
                                    onClick={() => processTextToRows(rawText, 'Pasted data')}
                                    disabled={!rawText.trim()}
                                    className="mt-4 bg-diner-primary disabled:opacity-50 hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Analyze Pasted Data
                                </button>
                            </div>
                            <div className="p-8 flex-1 flex flex-col justify-center items-center text-center bg-stone-50">
                                <div className="text-stone-400 mb-4 font-bold text-lg">OR</div>
                                <Icon name="upload" className="w-12 h-12 text-stone-300 mb-4" />
                                <h3 className="text-xl font-bold mb-2">Option 2: Upload File</h3>
                                <p className="text-sm text-diner-muted mb-6">Upload XLSX, XLS, ODS, CSV, TSV, pipe/semicolon text, JSON, HTML/XML tables, or similar inventory exports.</p>
                                <input 
                                    type="file" 
                                    ref={fileInputRef} 
                                    onChange={handleFileUpload} 
                                    accept={SUPPORTED_RESUPPLY_ACCEPT} 
                                    multiple
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3 px-6 rounded-lg transition-colors w-full shadow-sm"
                                >
                                    Browse Files
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex flex-col md:flex-row md:justify-between md:items-center gap-4 bg-stone-50">
                                <div>
                                    <h3 className="text-xl font-bold">Map Columns</h3>
                                    <p className="text-sm text-diner-muted">Confirm what data is in each column. Auto-detection is applied first. (Showing first 5 rows)</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                                    <button
                                        type="button"
                                        onClick={toggleHideIgnoredColumns}
                                        className={`${hideIgnoredColumns ? 'bg-diner-primary text-white hover:bg-diner-hover' : 'bg-white text-diner-text hover:bg-stone-50 border border-diner-border'} font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm`}
                                        title="Hide or show columns currently marked Ignore Column. This preference is remembered on this device."
                                    >
                                        {hideIgnoredColumns ? 'Show Ignored Columns' : 'Hide Ignored Columns'}
                                    </button>
                                    <button 
                                        onClick={processMappedData}
                                        className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center shadow-sm"
                                    >
                                        Continue <Icon name="arrowRight" className="w-4 h-4 ml-2" />
                                    </button>
                                </div>
                            </div>
                            <div className="resupply-map-scroll">
                                <table className="resupply-map-table text-left text-sm whitespace-nowrap">
                                    <thead className="bg-diner-surface border-b border-diner-border text-diner-text">
                                        <tr>
                                            {getVisibleImportColumnIndexes().map((colIndex) => (
                                                <th key={colIndex} className="p-3 font-semibold align-top">
                                                    <select 
                                                        value={columnMap[colIndex] || 'ignore'} 
                                                        onChange={(e) => handleMapChange(colIndex, e.target.value)}
                                                        title="Choose what this imported column represents"
                                                        className="resupply-map-select bg-white border border-stone-300 rounded p-2 text-stone-800 outline-none focus:border-diner-primary focus:ring-1 focus:ring-diner-primary font-medium"
                                                    >
                                                        <option value="ignore">Ignore Column</option>
                                                        <option value="name">Item Name</option>
                                                        <option value="size">Pack Size (e.g. 6/1.5 LB)</option>
                                                        <option value="price">Total Price</option>
                                                    </select>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-stone-100 text-diner-muted">
                                        {parsedRows.slice(0, 5).map((row, rowIndex) => (
                                            <tr key={rowIndex} className="hover:bg-stone-50">
                                                {getVisibleImportColumnIndexes().map((colIndex) => {
                                                    const cell = row[colIndex] || '';
                                                    return <td key={colIndex} title={cell} className="p-3 resupply-map-cell border-r border-stone-100">{cell}</td>;
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="bg-diner-surface border border-diner-border rounded-2xl shadow-sm overflow-hidden animation-fadeIn">
                            <div className="p-6 border-b border-diner-border flex justify-between items-center bg-orange-50/50">
                                <div>
                                    <h3 className="text-xl font-bold text-diner-primary">Review & Correct Data</h3>
                                    <p className="text-sm text-diner-muted">Verify the automatic conversions. Quantities stay in the uploaded unit here, while base units are saved in the background.</p>
                                </div>
                                <button 
                                    onClick={confirmAndMerge}
                                    className="bg-diner-primary hover:bg-diner-hover text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex items-center shadow-sm"
                                >
                                    <Icon name="save" className="w-4 h-4 mr-2" /> Save to Pantry
                                </button>
                            </div>
                            <div className="overflow-x-auto max-h-[60vh] overflow-y-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-stone-50 text-diner-text sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="p-4 font-semibold">Item Name</th>
                                            <th className="p-4 font-semibold">Original Pack</th>
                                            <th className="p-4 font-semibold w-32">Total Price ($)</th>
                                            <th className="p-4 font-semibold w-56">Imported Quantity</th>
                                            <th className="p-4 font-semibold">Final Cost / Unit</th>
